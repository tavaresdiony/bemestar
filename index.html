  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#0D0D0F;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:#F2F2F4}
    #root{max-width:480px;margin:0 auto;min-height:100vh}
    ::-webkit-scrollbar{display:none}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* ── Loading animations ── */

    /* Anel que se desenha em volta da logo (r=78 → circunferência ~490) */
    @keyframes drawRing{
      0%  {stroke-dashoffset:490;opacity:0}
      8%  {opacity:1}
      100%{stroke-dashoffset:0}
    }
    /* Logo entra com fade + scale */
    @keyframes logoEnter{
      0%  {opacity:0;transform:scale(0.75)}
      65% {opacity:1;transform:scale(1.04)}
      100%{opacity:1;transform:scale(1)}
    }
    /* Pulsação glow contínua */
    @keyframes glowPulse{
      0%,100%{filter:drop-shadow(0 0 12px #00E5A066)}
      50%    {filter:drop-shadow(0 0 28px #00E5A0CC)}
    }
    /* Anel pulsa suavemente depois de completar */
    @keyframes ringPulse{
      0%,100%{filter:drop-shadow(0 0 4px #00E5A055)}
      50%    {filter:drop-shadow(0 0 16px #00E5A0CC)}
    }
    /* Texto aparece */
    @keyframes textEnter{
      0%  {opacity:0;transform:translateY(6px)}
      100%{opacity:1;transform:translateY(0)}
    }
    /* Fade out geral */
    @keyframes fadeOut{0%{opacity:1}100%{opacity:0;visibility:hidden}}

    /* Tela de loading */
    .loading-wrap{
      position:fixed;inset:0;background:#000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;
    }
    .loading-wrap.fade-out{animation:fadeOut 0.5s ease forwards}

    /* Container relativo para logo + anel */
    .lc-logo-wrap{
      position:relative;
      display:flex;align-items:center;justify-content:center;
    }

    /* Imagem da logo: entra com fade+scale, depois pulsa */
    .lc-img{
      animation:
        logoEnter 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both,
        glowPulse 2.8s ease-in-out 1.5s infinite;
      border-radius:50%;
    }

    /* Anel SVG animado: se desenha após a logo aparecer */
    .lc-ring{pointer-events:none}
    .lc-circle{
      stroke-dasharray:490;
      stroke-dashoffset:490;
      animation:
        drawRing 1.2s cubic-bezier(0.4,0,0.2,1) 0.6s both,
        ringPulse 2.8s ease-in-out 2.2s infinite;
    }

    /* Texto ACUÉ */
    .loading-text{
      opacity:0;
      animation:textEnter 0.5s ease 1.6s both;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      color:#3a3a45;font-size:11px;margin-top:24px;
      letter-spacing:5px;font-weight:700;
    }
    .val{transition:filter 0.2s}
    .val.hidden{filter:blur(8px);user-select:none}
  </style>
</head>

function ymLabel(ym){const[y,m]=ym.split("-");return new Date(Number(y),Number(m)-1).toLocaleString("pt-BR",{month:"long",year:"numeric"});}

function dadosVazios(){return{meses:{},dividas:[],parcelamentos:[],investimentos:[],reservas:[],metas:[],contasFixasGlobais:[],catsCustom:[]};}
function hashSenha(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return String(h);}
function normalizarUsuario(v){return String(v||"").trim().toLowerCase();}
function usuarioValido(v){return/^[a-z0-9._]{3,20}$/.test(normalizarUsuario(v));}

// ─── Face ID / Biometria via WebAuthn ─────────────────────────────────────
const BIOMETRIC_KEY=`${APP_PREFIX}_biometric_`;

async function biometricDisponivel(){
  try{return!!(window.PublicKeyCredential&&await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());}catch{return false;}
}

// Registra credencial biométrica para o perfil
async function registrarBiometrico(perfilId,perfilNome){
  try{
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    const userId=new TextEncoder().encode(perfilId);
    const cred=await navigator.credentials.create({publicKey:{
      challenge,rp:{name:APP_NAME,id:window.location.hostname||"localhost"},
      user:{id:userId,name:perfilNome,displayName:perfilNome},
      pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
      authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},
      timeout:60000,
    }});
    if(cred){
      // Salva o ID da credencial para usar depois
      const credId=btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
      localStorage.setItem(BIOMETRIC_KEY+perfilId,credId);
      return true;
    }
  }catch(e){console.log("Biometric register error:",e);}
  return false;
}

// Autentica via biometria
async function autenticarBiometrico(perfilId){
  try{
    const credIdStr=localStorage.getItem(BIOMETRIC_KEY+perfilId);
    if(!credIdStr)return false;
    const credIdBytes=Uint8Array.from(atob(credIdStr),c=>c.charCodeAt(0));
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    const assertion=await navigator.credentials.get({publicKey:{
      challenge,
      allowCredentials:[{id:credIdBytes,type:"public-key",transports:["internal"]}],
      userVerification:"required",
      timeout:60000,
    }});
    return!!assertion;
  }catch(e){console.log("Biometric auth error:",e);return false;}
}

function temBiometrico(perfilId){return!!localStorage.getItem(BIOMETRIC_KEY+perfilId);}

// ─── Supabase helpers ──────────────────────────────────────────────────────
async function dbCarregarPerfis(){
  if(OFFLINE_MODE){
    try{
      const raw=localStorage.getItem(LS_PERFIS_KEY);
      const list=raw?JSON.parse(raw):[];
      return Array.isArray(list)?list:[];
    }catch{return[];}
  }
  const{data,error}=await sb.from("perfis").select("id,nome,cor,foto,senha_hash,codigo_recuperacao");
  if(error||!data)return[];
  return data
    .filter(r=>!r.nome.startsWith("__deleted__"))
    .map(r=>({id:r.id,nome:r.nome,username:r.username||"",cor:r.cor,foto:r.foto,senhaHash:r.senha_hash,codigoRecuperacao:r.codigo_recuperacao}));
}
async function dbSalvarPerfil(p){
  if(OFFLINE_MODE){
    const perfis=await dbCarregarPerfis();
    const i=perfis.findIndex(x=>x.id===p.id);
    const item={...p,foto:p.foto||null};
    if(i>=0)perfis[i]=item;else perfis.push(item);
    localStorage.setItem(LS_PERFIS_KEY,JSON.stringify(perfis));
    return;
  }
  await sb.from("perfis").upsert({id:p.id,nome:p.nome,username:p.username||null,cor:p.cor,foto:p.foto||null,senha_hash:p.senhaHash,codigo_recuperacao:p.codigoRecuperacao});
}
async function dbDeletarPerfil(id){
  if(OFFLINE_MODE){
    const perfis=(await dbCarregarPerfis()).filter(p=>p.id!==id);
    localStorage.setItem(LS_PERFIS_KEY,JSON.stringify(perfis));
    try{
      const raw=localStorage.getItem(LS_DADOS_KEY);
      const all=raw?JSON.parse(raw):{};
      delete all[id];
      localStorage.setItem(LS_DADOS_KEY,JSON.stringify(all));
    }catch{}
    return;
  }
  await sb.from("perfis").update({nome:"__deleted__"+Date.now()}).eq("id",id);
}
async function dbCarregarDados(perfilId){
  if(OFFLINE_MODE){
    try{
      const raw=localStorage.getItem(LS_DADOS_KEY);
      const all=raw?JSON.parse(raw):{};
      return all[perfilId]?{...dadosVazios(),...all[perfilId]}:dadosVazios();
    }catch{return dadosVazios();}
  }
  const{data}=await sb.from("dados_financeiros").select("dados").eq("perfil_id",perfilId).single();
  return data?{...dadosVazios(),...data.dados}:dadosVazios();
}
async function dbSalvarDados(perfilId,dados){
  if(OFFLINE_MODE){
    let all={};
    try{
      const raw=localStorage.getItem(LS_DADOS_KEY);
      all=raw?JSON.parse(raw):{};
    }catch{}
    all[perfilId]=dados;
    localStorage.setItem(LS_DADOS_KEY,JSON.stringify(all));
    return;
  }
  await sb.from("dados_financeiros").upsert({perfil_id:perfilId,dados,atualizado_em:new Date().toISOString()});
}

// ─── PWA Install Prompt ───────────────────────────────────────────────────────
const PWA_KEY=`${APP_PREFIX}_pwa_dismiss`;
function usePWAInstall(){
  const[prompt,setPrompt]=useState(null);
  const[mostrar,setMostrar]=useState(false);
  useEffect(()=>{
    const dispensou=localStorage.getItem(PWA_KEY);
    const standalone=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone;
    if(dispensou||standalone)return;
    const handler=ev=>{ev.preventDefault();setPrompt(ev);setMostrar(true);};
    window.addEventListener("beforeinstallprompt",handler);
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);
  const instalar=async()=>{if(!prompt)return;prompt.prompt();const{outcome}=await prompt.userChoice;if(outcome==="accepted")localStorage.setItem(PWA_KEY,"installed");setMostrar(false);setPrompt(null);};
  const dispensar=()=>{localStorage.setItem(PWA_KEY,"dismissed");setMostrar(false);};
  return{mostrar,instalar,dispensar};
}
function PWABanner({mostrar,instalar,dispensar}){
  if(!mostrar)return null;
  return h("div",{style:{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:448,background:C.card,border:`1px solid ${C.accent}44`,borderRadius:16,padding:"16px 18px",zIndex:90,boxShadow:"0 8px 32px #000000AA",animation:"fadeIn 0.3s ease",display:"flex",alignItems:"center",gap:12}},

    h("div",{style:{flex:1}},
      h("div",{style:{fontSize:14,fontWeight:700,color:C.text,marginBottom:2}},"Adicionar à tela inicial"),
      h("div",{style:{fontSize:12,color:C.muted}},`Acesse o ${APP_NAME} como um app, sem abrir o navegador.`)
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
      h("button",{onClick:instalar,style:{background:C.accent,color:C.bg,border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}},"Instalar"),
      h("button",{onClick:dispensar,style:{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",textAlign:"center"}},"Não mostrar mais")
    )
  );
}

// ─── Hook principal ────────────────────────────────────────────────────────
function useApp(){
  const[perfis,setPerfis]=useState([]);
  const[perfil,setPerfil]=useState(null);
  const[db,setDbRaw]=useState(dadosVazios);
  const[tela,setTela]=useState("loading");
  const saveTimer=useRef(null);
  const loadPerfilData=useCallback(async(p)=>{
    if(!normalizarUsuario(p.username)){
      setPerfil(p);
      setTela("definir_usuario");
      return;
    }
    setTela("carregando_dados");
    const dados=await dbCarregarDados(p.id);
    const ym=ymNow();if(!dados.meses[ym])dados.meses[ym]=mesVazio(ym);
    setDbRaw(dados);setPerfil(p);setTela("app");
  },[]);

  useEffect(()=>{
    const t0=Date.now();
    dbCarregarPerfis().then(p=>{
      // Animação mínima de 1.8s — mais curto para não frustrar se houver lentidão
      const elapsed=Date.now()-t0;
      const wait=Math.max(0,1800-elapsed);
      setTimeout(()=>{
        setPerfis(p);
        if(p.length===0){setTela("criar");return;}
        try{
          const authRaw=localStorage.getItem(LS_AUTH_KEY);
          const auth=authRaw?JSON.parse(authRaw):null;
          const perfilSalvo=auth?.perfilId?p.find(x=>x.id===auth.perfilId):null;
          if(perfilSalvo){loadPerfilData(perfilSalvo);return;}
        }catch{}
        setTela("perfis");
      },wait);
    }).catch(err=>{
      console.error("Erro ao carregar perfis:",err);
      // Tenta de novo uma vez antes de desistir
      dbCarregarPerfis().then(p=>{
        setPerfis(p);
        if(p.length===0){setTela("criar");return;}
        try{
          const authRaw=localStorage.getItem(LS_AUTH_KEY);
          const auth=authRaw?JSON.parse(authRaw):null;
          const perfilSalvo=auth?.perfilId?p.find(x=>x.id===auth.perfilId):null;
          if(perfilSalvo){loadPerfilData(perfilSalvo);return;}
        }catch{}
        setTela("perfis");
      }).catch(()=>{
        // Se falhar de novo, mostra tela de erro
        setTela("erro_conexao");
      });
    });
  },[loadPerfilData]);

  const setDb=useCallback((next)=>{
    setDbRaw(prev=>{
      const val=typeof next==="function"?next(prev):next;
      if(perfil){clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>dbSalvarDados(perfil.id,val),1000);}
      return val;
    });
  },[perfil]);

  const usernameExiste=useCallback((username,ignoreId=null)=>{
    const u=normalizarUsuario(username);
    return perfis.some(p=>p.id!==ignoreId&&normalizarUsuario(p.username)===u);
  },[perfis]);

  const criarPerfil=useCallback(async(nome,username,senha,cor,foto)=>{
    const id=`u_${Date.now()}`;
    const cod=String(Math.floor(10000000+Math.random()*90000000));
    const u=normalizarUsuario(username);
    if(!usuarioValido(u)||usernameExiste(u))return null;
    const novo={id,nome,username:u,cor,foto:foto||null,senhaHash:hashSenha(senha),codigoRecuperacao:cod};
    await dbSalvarPerfil(novo);setPerfis(prev=>[...prev,novo]);setTela("perfis");return cod;
  },[usernameExiste]);

  const editarPerfil=useCallback(async(id,campos)=>{
    const lista=perfis.map(p=>p.id===id?{...p,...campos}:p);
    await dbSalvarPerfil(lista.find(p=>p.id===id));
    setPerfis(lista);if(perfil?.id===id)setPerfil(prev=>({...prev,...campos}));
  },[perfis,perfil]);

  const deletarPerfil=useCallback(async(id)=>{
    await dbDeletarPerfil(id);setPerfis(prev=>prev.filter(p=>p.id!==id));
    localStorage.removeItem(BIOMETRIC_KEY+id);
  },[]);

  const entrar=useCallback(async(p,senha,lembrar=false)=>{
    if(hashSenha(senha)!==p.senhaHash)return false;
    if(lembrar)localStorage.setItem(LS_AUTH_KEY,JSON.stringify({perfilId:p.id,at:new Date().toISOString()}));
    else localStorage.removeItem(LS_AUTH_KEY);
    await loadPerfilData(p);
    return true;
  },[loadPerfilData]);

  const entrarBiometrico=useCallback(async(p)=>{
    const ok=await autenticarBiometrico(p.id);
    if(!ok)return false;
    localStorage.setItem(LS_AUTH_KEY,JSON.stringify({perfilId:p.id,at:new Date().toISOString()}));
    await loadPerfilData(p);
    return true;
  },[loadPerfilData]);

  const entrarComUsuarioSenha=useCallback(async(usuario,senha,lembrar=false)=>{
    const u=String(usuario||"").trim().toLowerCase();
    const p=perfis.find(x=>normalizarUsuario(x.username)===u);
    if(!p)return{ok:false,motivo:"usuario"};
    const ok=await entrar(p,senha,lembrar);
    return ok?{ok:true}:{ok:false,motivo:"senha"};
  },[perfis,entrar]);

  const definirUsuarioAtual=useCallback(async(username)=>{
    if(!perfil)return{ok:false,motivo:"sessao"};
    const u=normalizarUsuario(username);
    if(!usuarioValido(u))return{ok:false,motivo:"formato"};
    if(usernameExiste(u,perfil.id))return{ok:false,motivo:"duplicado"};
    const atualizado={...perfil,username:u};
    await dbSalvarPerfil(atualizado);
    setPerfis(prev=>prev.map(p=>p.id===atualizado.id?atualizado:p));
    setPerfil(atualizado);
    await loadPerfilData(atualizado);
    return{ok:true};
  },[perfil,usernameExiste,loadPerfilData]);

  const sair=useCallback(()=>{
    clearTimeout(saveTimer.current);
    localStorage.removeItem(LS_AUTH_KEY);
    setPerfil(null);setDbRaw(dadosVazios());setTela("perfis");
  },[]);

function FormCriarPerfil({onSalvar,onCancelar}){

      h("div",{style:{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:1,marginBottom:12}},"USUÁRIOS"),
      loading
        ?h("div",{style:{textAlign:"center",padding:32,color:C.muted}},"Carregando...")
        :stats.map(s=>h("div",{key:s.id,style:{background:C.card,border:`1px solid ${C.border}`,
            borderRadius:14,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12}},
            h("div",{style:{width:10,height:10,borderRadius:"50%",flexShrink:0,background:s.ativo?C.accent:C.subtle}}),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:14,fontWeight:600}},s.nome),
              h("div",{style:{fontSize:12,color:C.muted,marginTop:2}},
                s.ativo?`${s.meses} mês(es) registrado(s) · último acesso: ${s.ultimoAcesso}`:"Sem dados ainda"
              )
            ),
            s.ativo&&h("span",{style:{background:C.accentDim,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:C.accent}},"ativo")
          ))
    )
  );
}

// ─── APP PRINCIPAL ─────────────────────────────────────────────────────────
const TABS=[
  {id:"home",   label:"Início",  icon:"home"},
  {id:"gastos", label:"Dados",   icon:"wallet"},
  {id:"dividas",label:"Dívidas", icon:"alert"},
  {id:"invest", label:"Finanças",icon:"trend"},
  {id:"hist",   label:"Histórico",icon:"hist"},
];
const ABAS_MENSAIS=["home","gastos"];

function AppPrincipal({db,setDb,perfil,onSair,onEditarPerfil,onExcluirPerfil}){
  const[tab,setTab]=useState("home");
  const[mes,setMes]=useState(ymNow);
  const[showPerfil,setShowPerfil]=useState(false);
  const[hidden,setHidden]=useState(false);
  const tabLabel=TABS.find(t=>t.id===tab)?.label;
  const screens={
    home:   h(Dashboard,   {db,setDb,mes}),
    gastos: h(GastosContas,{db,setDb,mes}),
    dividas:h(Dividas,     {db,setDb,mes}),
    invest: h(InvestMetas, {db,setDb}),
    hist:   h(Historico,   {db,setDb,setMes,setTab}),
  };
  const pwa=usePWAInstall();
  return h(HiddenCtx.Provider,{value:{hidden,toggle:()=>setHidden(h=>!h)}},
    h("div",{style:{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",color:C.text,paddingBottom:90}},
      h(PWABanner,{...pwa}),
      // Header
      h("div",{style:{position:"sticky",top:0,zIndex:50,background:C.bg+"EE",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,paddingTop:"env(safe-area-inset-top, 12px)"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px 0"}},
          h("button",{onClick:()=>setShowPerfil(true),style:{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:0}},
            h(Avatar,{perfil,size:32}),
            h("span",{style:{fontSize:13,fontWeight:600,color:C.text}},perfil.nome)
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            // Botão olhinho
            h("button",{onClick:()=>setHidden(v=>!v),style:{background:hidden?C.accentDim:C.subtle,border:`1px solid ${hidden?C.accent:C.border}`,borderRadius:8,padding:"6px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}},
              h(Icon,{name:hidden?"eyeOff":"eye",size:16,color:hidden?C.accent:C.muted})
            ),
            ABAS_MENSAIS.includes(tab)
              ?h(MesSeletor,{mes,setMes,db,setDb})
              :h("div",{style:{fontSize:13,color:C.muted}},new Date().toLocaleDateString("pt-BR",{month:"short",day:"numeric"}))
          )
        ),
        h("div",{style:{padding:"6px 16px 12px",fontSize:19,fontWeight:800,letterSpacing:-0.5}},tabLabel)
      ),
      h("div",{style:{padding:"16px 16px 0"}},screens[tab]),
      // Bottom nav
      h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card+"F2",backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,paddingBottom:"env(safe-area-inset-bottom, 8px)"}},
        h("div",{style:{display:"flex",padding:"8px 0 4px"}},
          TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"6px 0"}},
            h(Icon,{name:t.icon,size:20,color:tab===t.id?C.accent:C.muted}),
            h("span",{style:{fontSize:9,fontWeight:600,color:tab===t.id?C.accent:C.muted}},t.label)
          ))
        )
      ),
      showPerfil&&h(Modal,{title:"Meu perfil",onClose:()=>setShowPerfil(false)},
        h(ModalEditarPerfil,{perfil,
          onSalvar:campos=>{onEditarPerfil(campos);setShowPerfil(false);},
          onSair:()=>{setShowPerfil(false);onSair();},
          onExcluirConta:()=>{
            if(window.confirm(`Tem certeza que quer excluir o perfil "${perfil.nome}"? Esta ação não pode ser desfeita.`)){
              onExcluirPerfil(perfil.id);
              setShowPerfil(false);
              onSair();
            }
          }
        })
      )
    )
  );
}

// ─── ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const{tela,setTela,perfis,setPerfis,perfil,db,setDb,criarPerfil,editarPerfil,deletarPerfil,entrar,entrarBiometrico,entrarComUsuarioSenha,definirUsuarioAtual,sair}=useApp();
  const[perfilSel,setPerfilSel]=useState(null);const[criando,setCriando]=useState(false);
  const[adminAberto,setAdminAberto]=useState(false);
  if(adminAberto)return h(TelaAdmin,{perfis,onFechar:()=>setAdminAberto(false)});
  if(tela==="loading")return h(Spinner,{msg:"Carregando perfis..."});
  if(tela==="carregando_dados")return h(Spinner,{msg:"Carregando seus dados..."});
  if(tela==="erro_conexao")return h("div",{style:{background:"#000",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,gap:16}},
    h("div",{style:{fontSize:40}},"📡"),
    h("div",{style:{fontSize:18,fontWeight:700,color:"#F2F2F4",textAlign:"center"}},"Sem conexão"),
    h("div",{style:{fontSize:14,color:"#6B6B7A",textAlign:"center",lineHeight:1.6}},"Não foi possível conectar ao servidor. Verifique sua internet e tente novamente."),
    h("button",{onClick:()=>{setTela("loading");dbCarregarPerfis().then(p=>{setPerfis(p);setTela(p.length===0?"criar":"perfis");}).catch(()=>setTela("erro_conexao"));},
      style:{background:"#00E5A0",color:"#000",border:"none",borderRadius:12,padding:"14px 32px",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8}},
      "Tentar novamente"
    )
  );
  if(criando)return h(FormCriarPerfil,{onSalvar:async(nome,username,senha,cor,foto)=>{const cod=await criarPerfil(nome,username,senha,cor,foto);return cod;},onCancelar:()=>setCriando(false)});
  if(tela==="criar"||tela==="perfis")return h(TelaPerfis,{perfis,onSelecionar:p=>{setPerfilSel(p);setTela("senha");},onCriar:()=>setCriando(true),onAdmin:()=>setAdminAberto(true),onLoginCredenciais:entrarComUsuarioSenha});
  if(tela==="senha"&&perfilSel)return h(TelaSenha,{perfil:perfilSel,onEntrar:entrar,onEntrarBiometrico:entrarBiometrico,onVoltar:()=>{setPerfilSel(null);setTela("perfis");}});
  if(tela==="definir_usuario"&&perfil)return h(TelaDefinirUsuario,{perfil,onSalvar:definirUsuarioAtual,onSair:sair});
  if(tela==="app"&&perfil)return h(AppPrincipal,{db,setDb,perfil,onSair:sair,onEditarPerfil:campos=>editarPerfil(perfil.id,campos),onExcluirPerfil:deletarPerfil});
  return h(TelaPerfis,{perfis,onSelecionar:p=>{setPerfilSel(p);setTela("senha");},onCriar:()=>setCriando(true),onAdmin:()=>setAdminAberto(true),onLoginCredenciais:entrarComUsuarioSenha});
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App,null));
</script>
</body>
</html>

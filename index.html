    #root{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:#000;}

    /* ══════════════════════════════════════════
       SPLASH — logo com efeito shimmer/luz
    ══════════════════════════════════════════ */
    @keyframes logoReveal {
      0%   { opacity:0; transform:scale(.85); filter:brightness(.3) contrast(1.2); }
      40%  { opacity:1; transform:scale(1.02); filter:brightness(.7) contrast(1.1); }
      100% { opacity:1; transform:scale(1);   filter:brightness(1) contrast(1); }
    }
    @keyframes shimmer {
      0%   { left:-100%; }
      100% { left:200%; }
    }
    @keyframes barFill {
      0%   { width:0%; opacity:0; }
      10%  { opacity:1; }
      100% { width:100%; opacity:1; }
    }
    @keyframes splashOut {
      0%   { opacity:1; }
      100% { opacity:0; pointer-events:none; }
    }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }

    #splash {
      position:fixed;inset:0;z-index:9999;background:#000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    #splash.hide { animation:splashOut .6s ease .2s forwards; }

    #s-wrap {
      position:relative;overflow:hidden;
      width:180px;height:180px;margin-bottom:44px;
    }
    #s-logo {
      width:180px;height:180px;object-fit:contain;display:block;
      animation:logoReveal 1s ease .1s both;
    }
    /* faixa de luz percorrendo a logo */
    #s-shine {
      position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(105deg,
        transparent 20%,
        rgba(255,106,0,.55) 45%,
        rgba(255,180,80,.7) 50%,
        rgba(255,106,0,.55) 55%,
        transparent 80%);
      animation:shimmer 1.4s ease .9s both;
      pointer-events:none;
    }
    #s-track {
      width:130px;height:2px;background:#111;border-radius:2px;overflow:hidden;
    }
    #s-bar {
      height:100%;
      background:linear-gradient(90deg,#CC5200,#FF6A00,#FF9500);
      border-radius:2px;
      animation:barFill 1.6s ease .5s both;
    }
  </style>
</head>

<script>
  // Splash some depois que React carregou — evita sobreposição
  var splashDone = false;
  function hideSplash() {
    if(splashDone) return;
    splashDone = true;
    var s = document.getElementById('splash');
    if(s){ s.classList.add('hide'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 800); }
  }
  // Mínimo de 2.4s para a animação terminar bonito
  setTimeout(hideSplash, 2400);
</script>

// Próximos 7 dias a partir de hoje
const getProximosDias = () => {
  const dias = [];
  const hoje = new Date();
  for(let i=0;i<7;i++){
    const d = new Date(hoje);
    d.setDate(hoje.getDate()+i);
    const dow = d.getDay();
    const label = i===0 ? "Hoje" : i===1 ? "Amanhã"
      : d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
    const tipo = dow===6?"sabado": dow===0?"domingo":
      dow===5?"sexta":"semana";
    dias.push({ date:d, dow, label, tipo, dateStr: d.toISOString().slice(0,10) });
  }
  return dias;
};

function LoginScreen({onLogin,onAdmin}){
  const [modo,setModo]     = useState("login");
  const [user,setUser]     = useState(""),  [senha,setSenha]=useState(""),  [confirma,setConfirma]=useState("");
  const [loading,setLoading]=useState(false),[erro,setErro]=useState(""),  [sucesso,setSucesso]=useState("");
  const [showAdmin,setShowAdmin]=useState(false),[adminUser,setAdminUser]=useState(""),[adminPass,setAdminPass]=useState(""),[adminErro,setAdminErro]=useState("");
  // Atrasa aparecer o conteúdo para não sobrepor splash
  const [visible,setVisible]=useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setVisible(true),2000); return()=>clearTimeout(t); },[]);

  const limpar = ()=>{setErro("");setSucesso("");};
  const inp    = {width:"100%",background:C.subtle,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:15,fontFamily:"inherit",boxSizing:"border-box"};

  const handleLogin = async()=>{
    if(!user.trim()||!senha){setErro("Preencha usuário e senha.");return;}
    if(!sb){setErro("Configuração pendente. Contate o administrador.");return;}
    setLoading(true);limpar();
    const {error,data} = await sb.auth.signInWithPassword({email:toEmail(user),password:senha});
    setLoading(false);
    if(error){
      if(error.message.includes("Email not confirmed"))
        setErro("E-mail não confirmado. Desative 'Enable email confirmations' em Supabase → Auth → Settings.");
      else if(error.message.includes("Invalid login")||error.message.includes("Invalid credentials"))
        setErro("Usuário ou senha incorretos.");
      else setErro("Erro: "+error.message);
    } else onLogin(data.user,user.trim());
  };

  const handleCadastro = async()=>{
    if(!user.trim()||!senha){setErro("Preencha todos os campos.");return;}
    if(senha.length<6){setErro("Senha precisa ter ao menos 6 caracteres.");return;}
    if(senha!==confirma){setErro("As senhas não coincidem.");return;}
    if(!sb){setErro("Configuração pendente.");return;}
    setLoading(true);limpar();
    const {error,data} = await sb.auth.signUp({email:toEmail(user),password:senha,options:{data:{username:user.trim()}}});
    setLoading(false);
    if(error){
      setErro(error.message.includes("already")||error.message.includes("User already registered")
        ?"Este usuário já existe. Tente outro nome."
        :"Erro: "+error.message);
    } else if(data?.session){
      onLogin(data.user,user.trim());
    } else {
      setErro("Conta criada, mas confirmação de e-mail está ativa. Desative em Supabase → Auth → Settings.");
      setModo("login");
    }
  };

  const handleAdminLogin = ()=>{
    if(adminUser.trim().toLowerCase()===ADMIN_USER&&adminPass.toLowerCase()===ADMIN_PASS) onAdmin();
    else setAdminErro("Credenciais incorretas.");
  };

  if(!visible) return <div style={{minHeight:"100vh",background:C.bg}}/>;

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,animation:"fadeIn .5s ease"}}>

      {!showAdmin && <>
        {/* Logo só o desenho */}
        <div style={{marginBottom:36}}>
          <img src="/logoamazonas.png" alt="Amazonas" style={{width:120,height:120,objectFit:"contain",display:"block"}}/>
        </div>

        <div style={{width:"100%",maxWidth:340}}>
          {modo!=="recuperar"&&(
            <div style={{display:"flex",background:C.subtle,borderRadius:12,padding:4,marginBottom:22}}>
              {[["login","Entrar"],["cadastro","Criar conta"]].map(([m,l])=>(
                <button key={m} onClick={()=>{setModo(m);limpar();setSenha("");setConfirma("");}} style={{flex:1,background:modo===m?C.accent:"none",color:modo===m?"#000":C.muted,border:"none",borderRadius:10,padding:"10px",fontWeight:800,fontSize:13,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase"}}>{l}</button>
              ))}
            </div>
          )}
          {modo==="recuperar"&&(
            <div style={{marginBottom:18}}>

        <div style={{fontSize:13,color:C.muted,lineHeight:1.6,marginBottom:14}}>Acesse mais rápido e receba lembretes de aulas sem abrir o navegador.</div>

      {/* Aula experimental */}
      <div style={{background:`linear-gradient(120deg,${C.accentD},${C.accent})`,borderRadius:14,padding:"14px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"rgba(0,0,0,.5)",textTransform:"uppercase"}}>Convide um amigo</div>
          <div style={{fontSize:17,fontWeight:900,color:"#000",marginTop:2}}>Aula Experimental</div>

      </div>

      {/* Seletor de dias com data real */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {dias.map((d,i)=>(
          <button key={i} onClick={()=>setDiaIdx(i)} style={{
            background:i===diaIdx?C.accent:C.subtle,
            color:i===diaIdx?"#000":C.muted,
            border:"none",borderRadius:10,padding:"8px 14px",
            fontWeight:800,fontSize:11,letterSpacing:.5,
            cursor:"pointer",fontFamily:"inherit",
            textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0,
            lineHeight:1.3,textAlign:"center",
          }}>
            {d.label}
          </button>
        ))}
      </div>

      {fds&&<div style={{background:C.accent+"18",border:`1px solid ${C.accent}33`,borderRadius:10,padding:"10px 14px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:C.accent}}>🏋️ Treino especial de fim de semana</div>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>Horários e aulas definidos pelo coach</div>
      </div>}

      {aulasDia.length===0&&<Card><div style={{textAlign:"center",padding:"16px 0",color:C.muted,fontSize:13,fontWeight:700}}>Nenhuma aula programada para este dia</div></Card>}

      {aulasDia.map(a=>{
        const resKey = diaSel.dateStr+"_"+a.id;
        const cheia=a.ocupadas>=a.vagas, res=reservas.includes(resKey);
        const cancelada=(aulasCanceladas||[]).includes(resKey);
        const pct=a.ocupadas/a.vagas, cor=pct>=1?C.red:pct>=.75?C.accent:C.green;
        return(
          <Card key={a.id} highlight={cancelada?C.red:res?C.accent:null}>
            {cancelada&&<div style={{background:C.red+"18",border:`1px solid ${C.red}33`,borderRadius:8,padding:"7px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
              <Icon name="warn" size={14} color={C.red}/>
              <span style={{fontSize:11,fontWeight:800,color:C.red}}>Aula cancelada pelo box</span>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:24,fontWeight:900,color:cancelada?C.red:res?C.accent:C.text}}>{a.hora}</div>
                <div style={{fontSize:15,fontWeight:800,marginTop:1}}>{a.nome}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>Coach {a.coach}</div>
              </div>
              {cancelada?<Tag color={C.red}>Cancelada</Tag>
                :res?<Tag color={C.accent}>✓ Reservado</Tag>
                :cheia?<Tag color={C.red}>Lotado</Tag>
                :<Tag color={C.green}>Disponível</Tag>}
            </div>
            {!cancelada&&<>
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Vagas</span>
                  <span style={{fontSize:12,fontWeight:800,color:cor}}>{a.ocupadas}/{a.vagas}</span>
                </div>
                <Bar value={a.ocupadas} max={a.vagas} color={cor} thin/>
              </div>
              {res
                ?<Btn full variant="ghost" onClick={()=>setReservas(reservas.filter(r=>r!==resKey))}>Cancelar reserva</Btn>
                :<Btn full disabled={cheia} onClick={()=>!cheia&&setReservas([...reservas,resKey])}>
                  {cheia?"Entrar na lista de espera":"Reservar vaga"}
                </Btn>}
            </>}
          </Card>
        );
      })}
    </div>
  );
}

  const abrirNovo=()=>{setEditId(null);setNovoEx("");setNovoPeso("");setShowForm(true);};
  const abrirEditar=pr=>{setEditId(pr.id);setNovoEx(pr.exercicio);setNovoPeso(pr.peso);setShowForm(true);};
  const salvar=()=>{if(!novoEx.trim()||!novoPeso.trim())return;const l=editId?prs.map(p=>p.id===editId?{...p,exercicio:novoEx.trim(),peso:novoPeso.trim()}:p):[...prs,{id:Date.now(),exercicio:novoEx.trim(),peso:novoPeso.trim()}];salvarPRs(l);setShowForm(false);setNovoEx("");setNovoPeso("");setEditId(null);};
  const excluir=id=>salvarPRs(prs.filter(p=>p.id!==id));
  const handleLogout=async()=>{setLogL(true);if(sb)await sb.auth.signOut();onLogout();};
  const inp={flex:1,background:C.subtle,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,fontFamily:"inherit"};
  const hist=[{data:"07/04",aula:"WOD Principal",hora:"18:30",coach:"Thiago"},{data:"05/04",aula:"WOD Matinal",hora:"05:30",coach:"Rafael"},{data:"04/04",aula:"WOD Almoço",hora:"12:00",coach:"Camila"}];
  return(
    <div style={{animation:"fadeIn .4s ease"}}>
      <div style={{textAlign:"center",padding:"10px 0 22px"}}>
        <div style={{width:80,height:80,borderRadius:"50%",background:`linear-gradient(135deg,${C.accentD},${C.accent})`,margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:900,color:"#000"}}>{nome[0]}</div>
        <div style={{fontSize:22,fontWeight:900}}>{nome}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:2}}>@{username}</div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
          <Tag color={C.green}>Ativo</Tag><Tag color={C.accent}>🔥 {streak} dias</Tag>{atingiu&&<Tag color={C.yellow}>🏆 Isento</Tag>}
        </div>
      </div>
      <Card highlight={atingiu?C.green:null}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div><div style={{fontSize:14,fontWeight:800}}>Meta de Check-ins</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{atingiu?"🏆 Meta atingida!":`Faltam ${meta-checkins} para ficar isento`}</div></div>
          <div style={{fontSize:26,fontWeight:900,color:atingiu?C.green:C.accent}}>{checkins}<span style={{fontSize:14,color:C.muted}}>/{meta}</span></div>
        </div>
        <Bar value={checkins} max={meta} color={atingiu?C.green:C.accent}/>
        {!atingiu&&<div style={{marginTop:10,background:C.subtle,borderRadius:8,padding:"8px 12px"}}><div style={{fontSize:11,fontWeight:700,color:C.muted,lineHeight:1.5}}>💡 Faça 15 check-ins no mês e fique isento de registrar presença nos dias restantes.</div></div>}
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <Card style={{margin:0,textAlign:"center"}}><div style={{fontSize:28,fontWeight:900,color:C.accent}}>{checkins}</div><div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Check-ins</div></Card>
        <Card style={{margin:0,textAlign:"center"}}><div style={{fontSize:28,fontWeight:900,color:C.green}}>{streak}</div><div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Dias Seguidos</div></Card>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase"}}>Recordes Pessoais</div>
        <Btn small onClick={abrirNovo}>+ Novo PR</Btn>
      </div>
      {showForm&&<Card highlight={C.accent} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.accent,textTransform:"uppercase",marginBottom:12}}>{editId?"Editar PR":"Novo PR"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
          <input value={novoEx} onChange={e=>setNovoEx(e.target.value)} placeholder="Exercício (ex: Snatch...)" style={{...inp,width:"100%",boxSizing:"border-box"}}/>
          <input value={novoPeso} onChange={e=>setNovoPeso(e.target.value)} placeholder="Peso (ex: 95kg, 1:45 min...)" style={{...inp,width:"100%",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:8}}><Btn full onClick={salvar}>Salvar</Btn><Btn full variant="ghost" onClick={()=>setShowForm(false)}>Cancelar</Btn></div>
      </Card>}
      {prs.length===0
        ?<Card><div style={{textAlign:"center",padding:"12px 0"}}><div style={{fontSize:24,marginBottom:8}}>🏋️</div><div style={{fontSize:13,color:C.muted,fontWeight:700}}>Nenhum PR ainda</div><div style={{fontSize:11,color:C.muted,marginTop:4}}>Toque em "+ Novo PR" para começar</div></div></Card>
        :<Card>{prs.map((pr,i)=><div key={pr.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
          <div style={{fontSize:14,fontWeight:800}}>{pr.exercicio}</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20,fontWeight:900,color:C.accent}}>{pr.peso}</span>
            <button onClick={()=>abrirEditar(pr)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10,fontWeight:700,color:C.muted,fontFamily:"inherit"}}>Editar</button>
            <button onClick={()=>excluir(pr.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="x" size={14} color={C.red}/></button>
          </div>
        </div>{i<prs.length-1&&<Divider/>}</div>)}</Card>}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8,marginTop:4}}>Histórico Recente</div>
      {hist.map((h,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.accent+"22",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="check" size={18} color={C.accent}/></div>
          <div><div style={{fontSize:14,fontWeight:800}}>{h.hora} · {h.aula}</div><div style={{fontSize:11,color:C.muted,marginTop:1}}>Coach {h.coach}</div></div>
        </div>
        <span style={{fontSize:11,fontWeight:700,color:C.muted}}>{h.data}</span>
      </div>)}
      <div style={{marginTop:8,marginBottom:4}}><Btn full variant="ghost" loading={logL} onClick={handleLogout}>Sair da conta</Btn></div>
    </div>
  );
}

/* ════════════════════════════════════════════
   ADMIN PANEL
════════════════════════════════════════════ */
function AdminPanel({onSair,aulasCanceladas,setAulasCanceladas,fdsConfig,setFdsConfig}){
  const [aba,setAba]         = useState("dashboard");
  const [pedidos,setPedidos] = useState(ESPERA_INIT);
  const [expandido,setExpandido] = useState(null);
  const now = new Date();
  const [calMes,setCalMes]   = useState(now.getMonth());
  const [calAno,setCalAno]   = useState(now.getFullYear());
  const [diaSel,setDiaSel]   = useState(now);
  // Editor de aulas FDS
  const [editFDS,setEditFDS] = useState(false);
  const [fdsLocal,setFdsLocal] = useState(fdsConfig);
  const [novaHora,setNovaHora]  = useState("");
  const [novoNome,setNovoNome]  = useState("");
  const [novoCoach,setNovoCoach]= useState("");
  const [novasVagas,setNovasVagas]=useState("15");
  const [fdsDia,setFdsDia]    = useState("sabado"); // sabado | domingo
  // Cancelar aulas
  const [mostraAulasCancelar,setMostraAulasCancelar] = useState(false);
  const [diaCancelIdx,setDiaCancelIdx] = useState(0);

  const pendentes  = pedidos.filter(p=>p.status==="pendente").length;
  const ativos     = MOCK_PERFIS.filter(p=>p.status==="ativo");
  const inativos   = MOCK_PERFIS.filter(p=>p.status==="inativo");
  const checkinsDoMes = Object.entries(MOCK_CHECKINS_MES).map(([u,t])=>({username:u,total:t})).sort((a,b)=>b.total-a.total);
  const atingiram15 = checkinsDoMes.filter(c=>c.total>=15);
  const checkinsDia = gerarCheckinsDia(diaSel);
  const totalHoje   = checkinsDia.length;

  const prevMes=()=>{if(calMes===0){setCalMes(11);setCalAno(calAno-1);}else setCalMes(calMes-1);};
  const nextMes=()=>{if(calMes===11){setCalMes(0);setCalAno(calAno+1);}else setCalMes(calMes+1);};
  const gerarCal=()=>{
    const p=new Date(calAno,calMes,1).getDay(), n=new Date(calAno,calMes+1,0).getDate(), c=[];
    for(let i=0;i<p;i++) c.push(null);
    for(let d=1;d<=n;d++) c.push(d);
    return c;
  };

  const cards = [
    {id:"total",   label:"Cadastros",    val:MOCK_PERFIS.length, color:C.accent, icon:"users", lista:MOCK_PERFIS},
    {id:"ativos",  label:"Ativos",       val:ativos.length,      color:C.green,  icon:"check", lista:ativos},
    {id:"inativos",label:"Inativos",     val:inativos.length,    color:C.red,    icon:"x",     lista:inativos},
    {id:"checkins",label:"Check-ins Hoje",val:totalHoje,         color:C.blue,   icon:"fire",  lista:[]},
  ];

  const abas = [
    {id:"dashboard",label:"Dashboard",icon:"home"},
    {id:"aulas",    label:"Aulas FDS", icon:"calendar"},
    {id:"pedidos",  label:"Pedidos",   icon:"bell",badge:pendentes},
    {id:"alunos",   label:"Alunos",    icon:"users"},
  ];

  // Adicionar aula no FDS
  const adicionarAulaFDS = () => {
    if(!novaHora||!novoNome||!novoCoach) return;
    const nova = {hora:novaHora,nome:novoNome,coach:novoCoach,vagas:parseInt(novasVagas)||15};
    const updated = {...fdsLocal, [fdsDia]:[...(fdsLocal[fdsDia]||[]),nova].sort((a,b)=>a.hora.localeCompare(b.hora))};
    setFdsLocal(updated);
    setNovaHora("");setNovoNome("");setNovoCoach("");setNovasVagas("15");
  };
  const removerAulaFDS = (idx) => {
    const arr = [...(fdsLocal[fdsDia]||[])];
    arr.splice(idx,1);
    setFdsLocal({...fdsLocal,[fdsDia]:arr});
  };
  const salvarFDS = () => { setFdsConfig(fdsLocal); setEditFDS(false); };

  // Cancelar aula
  const diasCancel = getProximosDias();
  const diaCancelSel = diasCancel[diaCancelIdx];
  const aulasParaCancelar = getAulasDia(diaCancelSel.tipo, fdsConfig);
  const toggleCancelar = (key) => {
    setAulasCanceladas(prev => prev.includes(key)?prev.filter(k=>k!==key):[...prev,key]);
  };

  const inp = {background:C.subtle,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,fontFamily:"inherit",width:"100%",boxSizing:"border-box"};

  return(
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:430,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"#050505",borderBottom:`1px solid ${C.border}`,padding:"13px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo size={28}/>
          <div><div style={{fontSize:13,fontWeight:900,color:C.accent,letterSpacing:1,lineHeight:1}}>ADMIN</div><div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:2,lineHeight:1}}>AMAZONAS ALTA PERFORMANCE</div></div>
        </div>
        <button onClick={onSair} style={{background:C.subtle,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <Icon name="arrow" size={14} color={C.muted}/><span style={{fontSize:11,fontWeight:700,color:C.muted,fontFamily:"inherit",letterSpacing:1}}>SAIR</span>
        </button>
      </div>

      <div style={{padding:"16px 16px 90px"}}>

        {/* ── DASHBOARD ── */}
        {aba==="dashboard"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Visão Geral</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {cards.map(s=>(
                <div key={s.id} onClick={()=>s.lista.length>0&&setExpandido(expandido===s.id?null:s.id)}
                  style={{background:C.card,border:`1px solid ${expandido===s.id?s.color:s.color+"33"}`,borderRadius:14,padding:"16px 14px",cursor:s.lista.length>0?"pointer":"default",transition:"border-color .2s"}}>
                  <Icon name={s.icon} size={18} color={s.color}/>
                  <div style={{fontSize:28,fontWeight:900,color:s.color,marginTop:8,lineHeight:1}}>{s.val}</div>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginTop:4}}>{s.label}</div>
                  {s.lista.length>0&&<div style={{fontSize:9,color:s.color,fontWeight:700,marginTop:4}}>{expandido===s.id?"▲ fechar":"▼ ver lista"}</div>}
                </div>
              ))}
            </div>

            {expandido&&cards.find(c=>c.id===expandido)?.lista.length>0&&(
              <div style={{marginBottom:14}}>
                {cards.find(c=>c.id===expandido).lista.map((p,i)=>{
                  const cor=cards.find(c=>c.id===expandido).color;
                  return <div key={p.id||i} style={{background:C.card,border:`1px solid ${cor}33`,borderRadius:12,padding:"11px 14px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <Avatar nome={p.username||"?"} color={cor} size={32}/>
                      <div><div style={{fontWeight:800,fontSize:13}}>@{p.username}</div><div style={{fontSize:10,color:C.muted}}>{p.plano} · {p.status}</div></div>
                    </div>
                    <Tag color={p.status==="ativo"?C.green:C.red}>{p.status}</Tag>
                  </div>;
                })}
              </div>
            )}

            {/* Calendário check-ins */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10,marginTop:4}}>Check-ins por Dia</div>
            <Card>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <button onClick={prevMes} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="chevronL" size={18} color={C.muted}/></button>
                <div style={{fontSize:14,fontWeight:800}}>{MESES[calMes]} {calAno}</div>
                <button onClick={nextMes} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="chevronR" size={18} color={C.muted}/></button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
                {["D","S","T","Q","Q","S","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                {gerarCal().map((d,i)=>{
                  if(!d)return<div key={i}/>;
                  const cel=new Date(calAno,calMes,d);
                  const isHoje=cel.toDateString()===now.toDateString();
                  const isSel=cel.toDateString()===diaSel.toDateString();
                  const ck=gerarCheckinsDia(cel).length;
                  return<button key={i} onClick={()=>setDiaSel(cel)} style={{aspectRatio:"1",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",position:"relative",
                    background:isSel?C.accent:isHoje?C.accentD+"44":ck>0?C.green+"18":C.subtle,
                    color:isSel?"#000":isHoje?C.accent:C.text,fontWeight:isSel||isHoje?900:600,fontSize:11}}>
                    {d}
                    {ck>0&&!isSel&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:C.green}}/>}
                  </button>;
                })}
              </div>
            </Card>

            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8}}>
              Check-ins — {diaSel.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})} ({checkinsDia.length})
            </div>
            {checkinsDia.length===0
              ?<Card><div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"8px 0"}}>Nenhum check-in neste dia</div></Card>
              :checkinsDia.map((c,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.green}33`,borderRadius:12,padding:"11px 14px",marginBottom:7,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Avatar nome={c.username} color={C.green} size={32}/>
                  <div><div style={{fontWeight:800,fontSize:13}}>@{c.username}</div><div style={{fontSize:10,color:C.muted}}>{c.aula}</div></div>
                </div>
                <Tag color={C.green}>{c.hora}</Tag>
              </div>)}

            {/* Isentos do mês */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8,marginTop:4}}>
              🏆 Isentos — {MESES[calMes]}
            </div>
            {atingiram15.length===0
              ?<Card><div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"8px 0"}}>Nenhum aluno atingiu 15 check-ins ainda</div></Card>
              :atingiram15.map((c,i)=><div key={i} style={{background:C.green+"0F",border:`1px solid ${C.green}33`,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Avatar nome={c.username} color={C.green}/>
                  <div><div style={{fontWeight:800,fontSize:14}}>@{c.username}</div><div style={{fontSize:11,color:C.muted}}>Isento pelo resto do mês</div></div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:20,fontWeight:900,color:C.green}}>{c.total}</div>
                  <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>check-ins</div>
                </div>
              </div>)}

            {/* Todos check-ins do mês */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8,marginTop:4}}>
              Ranking — {MESES[calMes]}
            </div>
            {checkinsDoMes.map((c,i)=>{
              const cor=c.total>=15?C.green:c.total>=10?C.accent:C.muted;
              return<div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar nome={c.username} color={cor} size={30}/>
                    <span style={{fontWeight:800,fontSize:13}}>@{c.username}</span>
                  </div>
                  <span style={{fontSize:14,fontWeight:900,color:cor}}>{c.total}/15 {c.total>=15?"🏆":""}</span>
                </div>
                <Bar value={c.total} max={15} color={cor} thin/>
              </div>;
            })}
          </div>
        )}

        {/* ── AULAS FIM DE SEMANA ── */}
        {aba==="aulas"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:20,fontWeight:900,letterSpacing:1}}>AULAS FIM DE SEMANA</div>
            </div>
            <p style={{fontSize:12,color:C.muted,marginBottom:16}}>Edite horários de sábado e domingo, e cancele aulas</p>

            {/* Cancelar aulas */}
            <div style={{background:C.red+"12",border:`1px solid ${C.red}33`,borderRadius:14,padding:16,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:mostraAulasCancelar?14:0}}>
                <div>
                  <div style={{fontSize:13,fontWeight:800,color:C.red}}>⚠️ Cancelar Aula</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>Alunos serão notificados</div>
                </div>
                <Btn small variant="danger" onClick={()=>setMostraAulasCancelar(!mostraAulasCancelar)}>
                  {mostraAulasCancelar?"Fechar":"Gerenciar"}
                </Btn>
              </div>
              {mostraAulasCancelar&&<>
                <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
                  {diasCancel.map((d,i)=><button key={i} onClick={()=>setDiaCancelIdx(i)} style={{background:i===diaCancelIdx?C.red:C.subtle,color:i===diaCancelIdx?"#fff":C.muted,border:"none",borderRadius:8,padding:"6px 12px",fontWeight:800,fontSize:10,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0}}>{d.label}</button>)}
                </div>
                {aulasParaCancelar.map(a=>{
                  const key=diaCancelSel.dateStr+"_"+a.id;
                  const isCancelada=(aulasCanceladas||[]).includes(key);
                  return<div key={a.id} style={{background:isCancelada?C.red+"18":C.subtle,border:`1px solid ${isCancelada?C.red+"55":C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:13,color:isCancelada?C.red:C.text}}>{a.hora} · {a.nome}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>Coach {a.coach}</div>
                    </div>
                    <button onClick={()=>toggleCancelar(key)} style={{background:isCancelada?C.green+"22":C.red+"22",border:`1px solid ${isCancelada?C.green+"44":C.red+"44"}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:800,color:isCancelada?C.green:C.red,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                      {isCancelada?"✓ Restaurar":"✗ Cancelar"}
                    </button>
                  </div>;
                })}
              </>}
            </div>

            {/* Editor aulas FDS */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editFDS?14:0}}>
                <div>
                  <div style={{fontSize:13,fontWeight:800}}>🗓️ Horários Sáb / Dom</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>Configure aulas do fim de semana</div>
                </div>
                <Btn small onClick={()=>{setFdsLocal(fdsConfig);setEditFDS(!editFDS);}}>
                  {editFDS?"Cancelar":"Editar"}
                </Btn>
              </div>

              {editFDS&&<>
                {/* Tabs sab/dom */}
                <div style={{display:"flex",gap:6,marginBottom:14}}>
                  {[["sabado","Sábado"],["domingo","Domingo"]].map(([d,l])=>(
                    <button key={d} onClick={()=>setFdsDia(d)} style={{flex:1,background:fdsDia===d?C.accent:C.subtle,color:fdsDia===d?"#000":C.muted,border:"none",borderRadius:10,padding:"8px",fontWeight:800,fontSize:12,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase"}}>{l}</button>
                  ))}
                </div>

                {/* Lista atual */}
                {(fdsLocal[fdsDia]||[]).map((a,i)=>(
                  <div key={i} style={{background:C.subtle,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:13}}>{a.hora} · {a.nome}</div>
                      <div style={{fontSize:11,color:C.muted}}>Coach {a.coach} · {a.vagas} vagas</div>
                    </div>
                    <button onClick={()=>removerAulaFDS(i)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="trash" size={16} color={C.red}/></button>
                  </div>
                ))}

                {/* Form nova aula */}
                <div style={{background:C.subtle,borderRadius:12,padding:14,marginTop:8,marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10}}>+ Nova aula</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <input value={novaHora} onChange={e=>setNovaHora(e.target.value)} placeholder="Horário (09:00)" style={inp}/>
                    <input value={novasVagas} onChange={e=>setNovasVagas(e.target.value)} placeholder="Vagas (15)" style={inp} type="number"/>
                  </div>
                  <div style={{marginBottom:8}}><input value={novoNome} onChange={e=>setNovoNome(e.target.value)} placeholder="Nome da aula" style={inp}/></div>
                  <div style={{marginBottom:12}}><input value={novoCoach} onChange={e=>setNovoCoach(e.target.value)} placeholder="Coach" style={inp}/></div>
                  <Btn full small variant="ghost" onClick={adicionarAulaFDS}>Adicionar aula</Btn>
                </div>

                <Btn full onClick={salvarFDS}>💾 Salvar alterações</Btn>
              </>}

              {!editFDS&&(
                <div style={{marginTop:14}}>
                  {["sabado","domingo"].map(dia=><div key={dia} style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{dia==="sabado"?"Sábado":"Domingo"}</div>
                    {(fdsConfig[dia]||[]).map((a,i)=><div key={i} style={{fontSize:12,color:C.text,padding:"3px 0"}}>{a.hora} — {a.nome} (Coach {a.coach})</div>)}
                    {!(fdsConfig[dia]||[]).length&&<div style={{fontSize:11,color:C.muted}}>Nenhuma aula cadastrada</div>}
                  </div>)}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── PEDIDOS ── */}
        {aba==="pedidos"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Solicitações</div>
            <p style={{fontSize:13,color:C.muted,marginBottom:14}}>Lista de espera e aulas experimentais</p>
            {pedidos.map(p=>{
              const cor=p.tipo==="experimental"?C.blue:C.yellow;
              return<Card key={p.id} highlight={p.status==="pendente"?cor:p.status==="aceito"?C.green:C.red}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar nome={p.nome} color={cor}/>
                    <div><div style={{fontWeight:800,fontSize:14}}>{p.nome}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.aula}</div><div style={{fontSize:10,color:C.muted,marginTop:1}}>Solicitado às {p.hora}</div></div>
                  </div>
                  <Tag color={cor}>{p.tipo==="experimental"?"Experimental":"Espera"}</Tag>
                </div>
                {p.status==="pendente"
                  ?<div style={{display:"flex",gap:8}}>
                    <Btn full variant="green" small onClick={()=>setPedidos(pedidos.map(x=>x.id===p.id?{...x,status:"aceito"}:x))}>✓ Aceitar</Btn>
                    <Btn full variant="danger" small onClick={()=>setPedidos(pedidos.map(x=>x.id===p.id?{...x,status:"recusado"}:x))}>✗ Recusar</Btn>
                  </div>
                  :<div style={{textAlign:"center"}}><Tag color={p.status==="aceito"?C.green:C.red}>{p.status==="aceito"?"✓ Aceito":"✗ Recusado"}</Tag></div>}
              </Card>;
            })}
          </div>
        )}

        {/* ── ALUNOS ── */}
        {aba==="alunos"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:14}}>Alunos Cadastrados</div>
            {MOCK_PERFIS.map(p=>{
              const ck=MOCK_CHECKINS_MES[p.username]||0,at=ck>=15;
              const cor=p.status==="inativo"?C.red:at?C.green:C.accent;
              return<Card key={p.id} highlight={at?C.green:p.status==="inativo"?C.red:null}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar nome={p.username} color={cor}/>
                    <div><div style={{fontWeight:800,fontSize:14}}>@{p.username}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.plano} · Vence {new Date(p.vencimento).toLocaleDateString("pt-BR")}</div></div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <Tag color={p.status==="ativo"?C.green:C.red}>{p.status}</Tag>
                    {at&&<Tag color={C.green}>🏆 Isento</Tag>}
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Check-ins</span>
                  <span style={{fontSize:13,fontWeight:900,color:cor}}>{ck}/15 {at?"✅":""}</span>
                </div>
                <Bar value={ck} max={15} color={cor} thin/>
                {at&&<div style={{marginTop:8,background:C.green+"18",border:`1px solid ${C.green}33`,borderRadius:8,padding:"6px 10px"}}><span style={{fontSize:11,color:C.green,fontWeight:700}}>Isento — sem check-in obrigatório pelo resto do mês</span></div>}
              </Card>;
            })}
          </div>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{display:"flex",background:"#050505",borderTop:`1px solid ${C.border}`,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
        {abas.map(t=>{const active=aba===t.id;return<button key={t.id} onClick={()=>setAba(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",background:"none",border:"none",borderTop:active?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",position:"relative"}}>
          <Icon name={t.icon} size={18} color={active?C.accent:C.muted}/>
          {t.badge>0&&<div style={{position:"absolute",top:6,right:"50%",marginRight:-14,width:15,height:15,borderRadius:"50%",background:C.red,fontSize:9,fontWeight:900,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</div>}
          <span style={{fontSize:8,fontWeight:700,letterSpacing:.5,marginTop:3,color:active?C.accent:C.muted,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.label}</span>
        </button>;})}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════ */
function App(){
  const [user,setUser]       = useState(null),[username,setUsername]=useState("");
  const [authLoading,setAuthLoading] = useState(true);
  const [adminMode,setAdminMode]     = useState(false);
  const [tab,setTab]         = useState("home"),[reservas,setReservas]=useState([]);
  const [showInstall,setShowInstall] = useState(false),[notifPerm,setNotifPerm]=useState("default");
  const [banner,setBanner]   = useState(null),[prs,setPrs]=useState(PR_DEF);
  // Estado compartilhado: aulas canceladas e config FDS
  const [aulasCanceladas,setAulasCanceladas] = useState(()=>JSON.parse(LS.get("aulasCanceladas")?.value||"[]"));
  const [fdsConfig,setFdsConfig] = useState(()=>JSON.parse(LS.get("fdsConfig")?.value||"null")||AULAS_FDS_DEFAULT);
  const timerRef = useRef(null);

  // Persiste cancelamentos e fds
  useEffect(()=>{ LS.set("aulasCanceladas",JSON.stringify(aulasCanceladas)); },[aulasCanceladas]);
  useEffect(()=>{ LS.set("fdsConfig",JSON.stringify(fdsConfig)); },[fdsConfig]);

  useEffect(()=>{
    if(!SUPABASE_OK||!sb){ setAuthLoading(false); return; }
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        setUser(session.user);
        setUsername(session.user.user_metadata?.username||session.user.email?.split("@")[0]||"aluno");
      }
      setAuthLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(session?.user) setUsername(session.user.user_metadata?.username||session.user.email?.split("@")[0]||"aluno");
    });
    window.addEventListener("beforeinstallprompt",e=>e.preventDefault());
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user)return;
    const r=LS.get(`prs_${user.id}`);if(r)setPrs(JSON.parse(r.value));
    const p=LS.get("install-never-show");if(!p)setShowInstall(true);
  },[user]);

  // Banner lembrete para reservas (busca em qualquer dia)
  useEffect(()=>{
    if(reservas.length===0){setBanner(null);return;}
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>{
      const dias=getProximosDias();
      for(const dia of dias){
        const aulas=getAulasDia(dia.tipo,fdsConfig);
        const res=aulas.find(a=>reservas.includes(dia.dateStr+"_"+a.id));
        if(res){setBanner({...res,label:dia.label});return;}
      }
    },4000);
    return ()=>clearTimeout(timerRef.current);
  },[reservas,fdsConfig]);

  const salvarPRs = lista=>{setPrs(lista);if(user)LS.set(`prs_${user.id}`,JSON.stringify(lista));};
  const fecharInstall = ()=>setShowInstall(false);
  const nuncaMostrar  = ()=>{setShowInstall(false);LS.set("install-never-show","1");};
  const ativarNotif   = async()=>{
    if(!("Notification"in window)){alert("Adicione o app à tela inicial para ativar notificações.");return;}
    const p=await Notification.requestPermission();setNotifPerm(p);
    if(p==="granted") new Notification("Amazonas Alta Performance 🔥",{body:"Notificações ativadas!",icon:"/logoamazonas.png"});
  };

  if(authLoading) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <Logo size={60}/>
      <div style={{width:30,height:30,border:`3px solid ${C.border}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
    </div>
  );

  if(adminMode) return <AdminPanel onSair={()=>setAdminMode(false)} aulasCanceladas={aulasCanceladas} setAulasCanceladas={setAulasCanceladas} fdsConfig={fdsConfig} setFdsConfig={setFdsConfig}/>;
  if(!user)     return <LoginScreen onLogin={(u,uname)=>{setUser(u);setUsername(uname||u.user_metadata?.username||u.email?.split("@")[0]||"aluno");}} onAdmin={()=>setAdminMode(true)}/>;

  const navTabs=[{id:"home",label:"Início",icon:"home"},{id:"aulas",label:"Aulas",icon:"calendar"},{id:"perfil",label:"Perfil",icon:"person"}];
  const screens={
    home:   <HomeScreen username={username} reservas={reservas} setReservas={setReservas} setTab={setTab} notifPerm={notifPerm} onAtivarNotif={ativarNotif} prs={prs} fdsConfig={fdsConfig}/>,
    aulas:  <AulasScreen reservas={reservas} setReservas={setReservas} aulasCanceladas={aulasCanceladas} fdsConfig={fdsConfig}/>,
    perfil: <PerfilScreen user={user} username={username} prs={prs} salvarPRs={salvarPRs} onLogout={()=>{setUser(null);setUsername("");setTab("home");}}/>,
  };

  return(
    <div style={{fontFamily:"'Barlow Condensed',Impact,sans-serif",background:C.bg,color:C.text,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}} @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>

      {banner&&<NotifBanner aula={banner} onDismiss={()=>setBanner(null)}/>}

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"13px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo size={30}/>
          <div>
            <div style={{fontSize:13,fontWeight:900,color:C.accent,letterSpacing:2,lineHeight:1}}>AMAZONAS</div>
            <div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:2,lineHeight:1}}>ALTA PERFORMANCE</div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 16px 90px"}}>{screens[tab]}</div>

      {/* Nav */}
      <div style={{display:"flex",background:C.surface,borderTop:`1px solid ${C.border}`,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
        {navTabs.map(t=>{const active=tab===t.id;return<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",background:"none",border:"none",borderTop:active?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer"}}>
          <Icon name={t.icon} size={20} color={active?C.accent:C.muted}/>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:1,marginTop:4,color:active?C.accent:C.muted,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.label}</span>
        </button>;})}
      </div>

      {showInstall&&<InstallPopup onClose={fecharInstall} onNever={nuncaMostrar}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

    html,body{height:100%;background:#080808;}

    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}
    input::placeholder{color:#444;}
    input,button,textarea{font-family:'Barlow Condensed',Impact,sans-serif;}
    button{-webkit-tap-highlight-color:transparent;outline:none;}
    input{outline:none;}
    @keyframes splashLogoIn{0%{transform:scale(0.5) rotate(-10deg);opacity:0}65%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
    @keyframes splashTextIn{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes splashBarFill{0%{width:0%}100%{width:100%}}
    @keyframes splashFadeOut{0%{opacity:1;visibility:visible}100%{opacity:0;visibility:hidden}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    #splash.hide{animation:splashFadeOut .5s ease .1s forwards;}

    #splash-track{width:140px;height:3px;background:#1a1a1a;border-radius:3px;overflow:hidden;animation:splashTextIn .3s ease .6s both;}
    #splash-bar{height:100%;background:linear-gradient(90deg,#CC5200,#FF6A00);border-radius:3px;animation:splashBarFill 1.3s ease .7s both;}

/* ════════════════════════════════════════════════════
   LOGIN
════════════════════════════════════════════════════ */
function LoginScreen({onLogin}){
  const [email,setEmail]=useState(""),  [senha,setSenha]=useState(""),  [showSenha,setShowSenha]=useState(false);
  const [loading,setLoading]=useState(false),  [erro,setErro]=useState(""),  [sucesso,setSucesso]=useState("");
  const [modo,setModo]=useState("login");

  const limpar=()=>{setErro("");setSucesso("");};
  const inp={width:"100%",background:C.subtle,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:15,fontFamily:"inherit",boxSizing:"border-box"};

  const handleLogin=async()=>{
    if(!email||!senha){setErro("Preencha e-mail e senha.");return;}
    setLoading(true);limpar();
    const{error,data}=await sb.auth.signInWithPassword({email,password:senha});
    setLoading(false);
    if(error)setErro("E-mail ou senha incorretos.");
    else onLogin(data.user);
  };
  const handleCadastro=async()=>{
    if(!email||!senha){setErro("Preencha e-mail e senha.");return;}
    if(senha.length<6){setErro("Senha precisa ter ao menos 6 caracteres.");return;}
    setLoading(true);limpar();
    const{error}=await sb.auth.signUp({email,password:senha});
    setLoading(false);
    if(error)setErro("Erro ao criar conta.");
    else{setSucesso("Conta criada! Verifique seu e-mail.");setModo("login");}
  };
  const handleRecuperar=async()=>{
    if(!email){setErro("Digite seu e-mail.");return;}
    setLoading(true);limpar();
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
    setLoading(false);
    if(error)setErro("Erro ao enviar.");
    else setSucesso("Link enviado! Verifique seu e-mail.");
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",marginBottom:36,animation:"fadeIn .5s ease"}}>
        <img src="/favicon-512x512.png" alt="Amazonas" style={{width:110,height:110,borderRadius:20,objectFit:"cover",marginBottom:16,boxShadow:`0 0 40px ${C.accent}44`}}/>
        <div style={{fontSize:28,fontWeight:900,letterSpacing:3,color:C.accent,lineHeight:1}}>AMAZONAS</div>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:4,marginTop:4}}>ALTA PERFORMANCE</div>
      </div>
      <div style={{width:"100%",maxWidth:340,animation:"fadeIn .5s ease .1s both"}}>
        {modo!=="recuperar"&&(
          <div style={{display:"flex",background:C.subtle,borderRadius:12,padding:4,marginBottom:24}}>
            {[["login","Entrar"],["cadastro","Criar conta"]].map(([m,l])=>(
              <button key={m} onClick={()=>{setModo(m);limpar();}} style={{flex:1,background:modo===m?C.accent:"none",color:modo===m?"#000":C.muted,border:"none",borderRadius:10,padding:"10px",fontWeight:800,fontSize:13,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase"}}>{l}</button>
            ))}
          </div>
        )}
        {modo==="recuperar"&&(
          <div style={{marginBottom:20}}>
            <button onClick={()=>{setModo("login");limpar();}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit",fontSize:12,fontWeight:700}}>
              <Icon name="arrow" size={14} color={C.muted}/> Voltar
            </button>
            <div style={{fontSize:20,fontWeight:900,marginTop:12,marginBottom:4}}>Recuperar senha</div>
            <div style={{fontSize:13,color:C.muted}}>Enviaremos um link para seu e-mail.</div>
          </div>
        )}
        {sucesso&&<div style={{background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:13,fontWeight:700,color:C.green}}>✅ {sucesso}</div>}
        <div style={{marginBottom:12}}><input type="email" value={email} onChange={e=>{setEmail(e.target.value);limpar();}} placeholder="E-mail" style={inp}/></div>
        {modo!=="recuperar"&&(
          <div style={{position:"relative",marginBottom:8}}>
            <input type={showSenha?"text":"password"} value={senha} onChange={e=>{setSenha(e.target.value);limpar();}} onKeyDown={e=>e.key==="Enter"&&(modo==="login"?handleLogin():handleCadastro())} placeholder="Senha" style={{...inp,paddingRight:48}}/>
            <button onClick={()=>setShowSenha(!showSenha)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name={showSenha?"eyeOff":"eye"} size={18} color={C.muted}/></button>
          </div>
        )}
        {erro&&<div style={{fontSize:12,color:C.red,fontWeight:700,marginBottom:12,padding:"8px 12px",background:C.red+"14",borderRadius:8,border:`1px solid ${C.red}33`}}>⚠️ {erro}</div>}
        <div style={{marginTop:16}}>
          {modo==="login"&&<><Btn full loading={loading} onClick={handleLogin}>Entrar</Btn><button onClick={()=>{setModo("recuperar");limpar();}} style={{background:"none",border:"none",color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer",width:"100%",marginTop:14,fontFamily:"inherit"}}>Esqueci minha senha</button></>}
          {modo==="cadastro"&&<Btn full loading={loading} onClick={handleCadastro}>Criar conta</Btn>}
          {modo==="recuperar"&&<Btn full loading={loading} onClick={handleRecuperar}>Enviar link</Btn>}
        </div>
      </div>
    </div>
  );
}

  return(
    <div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,0.82)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.surface,borderRadius:"20px 20px 0 0",border:`1px solid ${C.border}`,padding:"20px 20px 40px",width:"100%",maxWidth:430,animation:"slideUp .3s ease"}}>
        <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <Logo size={52}/>
          <div><div style={{fontSize:18,fontWeight:900,color:C.accent,letterSpacing:1}}>AMAZONAS</div><div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:3}}>ALTA PERFORMANCE</div></div>
        </div>
        <div style={{fontSize:20,fontWeight:900,marginBottom:6}}>Adicione à tela inicial! 📲</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.6,marginBottom:16}}>Acesse mais rápido e receba lembretes de aulas sem abrir o navegador.</div>
        <div style={{background:C.subtle,borderRadius:12,padding:14,marginBottom:18}}>
          {showIOS&&<div style={{marginBottom:showAndroid?12:0}}><div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.accent,textTransform:"uppercase",marginBottom:8}}>📱 iPhone / iPad (Safari)</div><Step n="1" text="Toque em Compartilhar na barra do Safari"/><Step n="2" text='"Adicionar à Tela de Início"'/><Step n="3" text='Confirme tocando em "Adicionar"'/>{isIOS&&<p style={{fontSize:11,color:C.muted,marginTop:8,fontWeight:600,lineHeight:1.5}}>⚠️ Notificações só funcionam após adicionar à tela inicial.</p>}</div>}
          {showIOS&&showAndroid&&<div style={{height:1,background:C.border,margin:"12px 0"}}/>}
          {showAndroid&&<div><div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.accent,textTransform:"uppercase",marginBottom:8}}>🤖 Android (Chrome)</div><Step n="1" text="Toque no menu (⋮) no canto superior direito"/><Step n="2" text='"Adicionar à tela inicial"'/><Step n="3" text="Confirme e pronto!"/></div>}
        </div>
        <Btn full onClick={onClose}>Entendido!</Btn>
        <button onClick={onNever} style={{background:"none",border:"none",color:C.muted,fontSize:11,fontWeight:700,cursor:"pointer",width:"100%",marginTop:12,fontFamily:"inherit",letterSpacing:1,textTransform:"uppercase"}}>Não mostrar novamente</button>
      </div>
    </div>
  );
}

            {expandido&&cards.find(c=>c.id===expandido)?.lista.length>0&&(
              <div style={{marginBottom:14}}>
                {cards.find(c=>c.id===expandido).lista.map(a=>{const cor=cards.find(c=>c.id===expandido).color;return<div key={a.id} style={{background:C.card,border:`1px solid ${cor}33`,borderRadius:12,padding:"11px 14px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nome={a.nome} color={cor} size={32}/><div><div style={{fontWeight:800,fontSize:13}}>{a.nome}</div><div style={{fontSize:10,color:C.muted}}>{a.plano} · Vence {a.venc}</div></div></div><div style={{textAlign:"right"}}><div style={{fontSize:15,fontWeight:900,color:cor}}>{a.checkins}</div><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>check-ins</div></div></div>;})}
              </div>
            )}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8}}>🏆 Isentos este mês</div>
            {isentos.length===0?<Card><div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"8px 0"}}>Nenhum aluno atingiu 15 check-ins ainda</div></Card>:isentos.map(a=><div key={a.id} style={{background:C.green+"0F",border:`1px solid ${C.green}33`,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nome={a.nome} color={C.green}/><div><div style={{fontWeight:800,fontSize:14}}>{a.nome}</div><div style={{fontSize:11,color:C.muted}}>{a.plano} · Vence {a.venc}</div></div></div><div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:900,color:C.green}}>{a.checkins}</div><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>check-ins</div></div></div>)}
          </div>
        )}
        {aba==="pedidos"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Solicitações</div>
            <p style={{fontSize:13,color:C.muted,marginBottom:14}}>Lista de espera e aulas experimentais</p>
            {pedidos.map(p=>{const cor=p.tipo==="experimental"?C.blue:C.yellow;return<Card key={p.id} highlight={p.status==="pendente"?cor:p.status==="aceito"?C.green:C.red}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nome={p.nome} color={cor}/><div><div style={{fontWeight:800,fontSize:14}}>{p.nome}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.aula}</div><div style={{fontSize:10,color:C.muted,marginTop:1}}>Solicitado às {p.hora}</div></div></div><Tag color={p.tipo==="experimental"?C.blue:C.yellow}>{p.tipo==="experimental"?"Experimental":"Espera"}</Tag></div>{p.status==="pendente"?<div style={{display:"flex",gap:8}}><Btn full variant="green" small onClick={()=>responder(p.id,"aceito")}>✓ Aceitar</Btn><Btn full variant="danger" small onClick={()=>responder(p.id,"recusado")}>✗ Recusar</Btn></div>:<div style={{textAlign:"center"}}><Tag color={p.status==="aceito"?C.green:C.red}>{p.status==="aceito"?"✓ Aceito":"✗ Recusado"}</Tag></div>}</Card>;})}
          </div>
        )}
        {aba==="alunos"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:14}}>Alunos — Check-ins do mês</div>
            {[...ADMIN_ALUNOS].sort((a,b)=>b.checkins-a.checkins).map(a=>{const at=a.checkins>=15,cor=a.status==="vencido"?C.red:at?C.green:C.accent;return<Card key={a.id} highlight={at?C.green:a.status==="vencido"?C.red:null}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nome={a.nome} color={cor}/><div><div style={{fontWeight:800,fontSize:15}}>{a.nome}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{a.plano} · Vence {a.venc}</div></div></div><div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><Tag color={a.status==="ativo"?C.green:C.red}>{a.status}</Tag>{at&&<Tag color={C.green}>🏆 Isento</Tag>}</div></div><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Check-ins</span><span style={{fontSize:13,fontWeight:900,color:cor}}>{a.checkins}/15 {at?"✅":""}</span></div><Bar value={a.checkins} max={15} color={cor} thin/>{at&&<div style={{marginTop:8,background:C.green+"18",border:`1px solid ${C.green}33`,borderRadius:8,padding:"6px 10px"}}><span style={{fontSize:11,color:C.green,fontWeight:700}}>Isento — sem check-in pelo resto do mês</span></div>}</Card>;})}
          </div>
        )}
      </div>
      <div style={{display:"flex",background:"#0D0D0D",borderTop:`1px solid ${C.border}`,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
        {abas.map(t=>{const active=aba===t.id;return<button key={t.id} onClick={()=>setAba(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",background:"none",border:"none",borderTop:active?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",position:"relative"}}><Icon name={t.icon} size={20} color={active?C.accent:C.muted}/>{t.badge>0&&<div style={{position:"absolute",top:6,right:"50%",marginRight:-18,width:16,height:16,borderRadius:"50%",background:C.red,fontSize:9,fontWeight:900,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</div>}<span style={{fontSize:9,fontWeight:700,letterSpacing:1,marginTop:4,color:active?C.accent:C.muted,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.label}</span></button>;})}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null),[authLoading,setAuthLoading]=useState(true);
  const[tab,setTab]=useState("home"),[reservas,setReservas]=useState([]);
  const[adminMode,setAdminMode]=useState(false),[adminAuth,setAdminAuth]=useState(false);
  const[showInstall,setShowInstall]=useState(false),[notifPerm,setNotifPerm]=useState("default");
  const[banner,setBanner]=useState(null),[prs,setPrs]=useState(PR_DEF);
  const timerRef=useRef(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setUser(session?.user||null); setAuthLoading(false); });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    window.addEventListener("beforeinstallprompt",e=>e.preventDefault());
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user)return;
    const r=LS.get(`prs_${user.id}`);if(r)setPrs(JSON.parse(r.value));
    const p=LS.get("install-never-show");if(!p)setShowInstall(true);
  },[user]);

  useEffect(()=>{
    const res=AULAS.find(a=>reservas.includes(a.id));
    if(!res){setBanner(null);return;}
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>setBanner(res),4000);
    return()=>clearTimeout(timerRef.current);
  },[reservas]);

  const salvarPRs=lista=>{setPrs(lista);if(user)LS.set(`prs_${user.id}`,JSON.stringify(lista));};
  const fecharInstall=()=>setShowInstall(false);
  const nuncaMostrar=()=>{setShowInstall(false);LS.set("install-never-show","1");};
  const ativarNotif=async()=>{
    if(!("Notification"in window)){alert("Adicione o app à tela inicial para ativar notificações.");return;}
    const p=await Notification.requestPermission();setNotifPerm(p);
    if(p==="granted")new Notification("Amazonas Alta Performance 🔥",{body:"Notificações ativadas!",icon:"/favicon-512x512.png"});
  };

  if(authLoading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <Logo size={60}/>
      <div style={{width:32,height:32,border:`3px solid ${C.border}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
    </div>
  );

  if(!user)return <LoginScreen onLogin={setUser}/>;
  if(adminMode){
    if(!adminAuth)return <AdminLogin onLogin={()=>setAdminAuth(true)}/>;
    return <AdminPanel onSair={()=>{setAdminMode(false);setAdminAuth(false);}}/>;
  }

  const navTabs=[{id:"home",label:"Início",icon:"home"},{id:"aulas",label:"Aulas",icon:"calendar"},{id:"perfil",label:"Perfil",icon:"person"}];
  const screens={
    home:<HomeScreen user={user} reservas={reservas} setReservas={setReservas} setTab={setTab} notifPerm={notifPerm} onAtivarNotif={ativarNotif} prs={prs}/>,
    aulas:<AulasScreen reservas={reservas} setReservas={setReservas}/>,
    perfil:<PerfilScreen user={user} prs={prs} salvarPRs={salvarPRs} onLogout={()=>{setUser(null);setTab("home");}}/>,
  };

  return(
    <div style={{fontFamily:"'Barlow Condensed',Impact,sans-serif",background:C.bg,color:C.text,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}} @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>
      {banner&&<NotifBanner aula={banner} onDismiss={()=>setBanner(null)}/>}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"13px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo size={32}/>
          <div><div style={{fontSize:14,fontWeight:900,color:C.accent,letterSpacing:2,lineHeight:1}}>AMAZONAS</div><div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:2,lineHeight:1}}>ALTA PERFORMANCE</div></div>
        </div>
        <button onClick={()=>setAdminMode(true)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}><Icon name="lock" size={12} color={C.muted}/><span style={{fontSize:9,fontWeight:700,color:C.muted,fontFamily:"inherit",letterSpacing:1}}>ADMIN</span></button>
      </div>
      <div style={{padding:"16px 16px 90px"}}>{screens[tab]}</div>
      <div style={{display:"flex",background:C.surface,borderTop:`1px solid ${C.border}`,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
        {navTabs.map(t=>{const active=tab===t.id;return<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",background:"none",border:"none",borderTop:active?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer"}}><Icon name={t.icon} size={20} color={active?C.accent:C.muted}/><span style={{fontSize:9,fontWeight:700,letterSpacing:1,marginTop:4,color:active?C.accent:C.muted,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.label}</span></button>;})}
      </div>
      {showInstall&&<InstallPopup onClose={fecharInstall} onNever={nuncaMostrar}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

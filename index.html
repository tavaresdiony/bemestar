<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>

  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Amazonas"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/logoamazonas.png"/>
  <link rel="apple-touch-icon" href="/logoamazonas.png"/>
  <title>Amazonas Alta Performance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;background:#000000;}
    body{font-family:'Barlow Condensed',Impact,sans-serif;color:#F0F0F0;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    #root{max-width:430px;margin:0 auto;min-height:100vh;position:relative;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}
    input::placeholder{color:#444;}
    input,button,textarea{font-family:'Barlow Condensed',Impact,sans-serif;}
    button{-webkit-tap-highlight-color:transparent;outline:none;}
    input{outline:none;}

    /* ── SPLASH ─────────────────────────────────────── */
    @keyframes logoIn   {0%{transform:scale(.5) rotate(-10deg);opacity:0}65%{transform:scale(1.08) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes barFill  {0%{width:0}100%{width:100%}}
    @keyframes textIn   {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeOut  {to{opacity:0;pointer-events:none}}
    @keyframes fadeIn   {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp  {from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes spin     {to{transform:rotate(360deg)}}

    #splash{position:fixed;inset:0;z-index:9999;background:#0000008;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    #splash.hide{animation:fadeOut .5s ease forwards;}
    #s-logo{width:160px;height:160px;object-fit:contain;margin-bottom:40px;animation:logoIn .8s cubic-bezier(.34,1.56,.64,1) both;}
    #s-track{width:130px;height:3px;background:#1a1a1a;border-radius:3px;overflow:hidden;animation:textIn .3s ease .6s both;}
    #s-bar{height:100%;background:linear-gradient(90deg,#CC5200,#FF6A00);border-radius:3px;animation:barFill 1.4s ease .7s both;}
  </style>
</head>
<body>

<div id="splash">
  <img id="s-logo" src="/logoamazonas.png" alt="Amazonas"/>
  <div id="s-track"><div id="s-bar"></div></div>
</div>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script>
  setTimeout(function(){
    var s=document.getElementById('splash');
    if(s){s.classList.add('hide');setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},550);}
  },2300);
</script>

/* ── Ícones ──────────────────────────────── */
const P={home:"M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.6 5.4 21 6 21H9M19 10L21 12M19 10V20C19 20.6 18.6 21 18 21H15M9 21C9 21 9 15 12 15C15 15 15 21 15 21M9 21H15",calendar:"M8 2V6M16 2V6M3 10H21M5 4H19C20.1 4 21 4.9 21 6V20C21 21.1 20.1 22 19 22H5C3.9 22 3 21.1 3 20V6C3 4.9 3.9 4 5 4Z",person:"M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21M12 11C14.2 11 16 9.2 16 7C16 4.8 14.2 3 12 3C9.8 3 8 4.8 8 7C8 9.2 9.8 11 12 11Z",bell:"M18 8A6 6 0 006 8C6 15 3 17 3 17H21S18 15 18 8ZM13.73 21A2 2 0 0110.27 21",check:"M9 12L11 14L15 10M21 12C21 16.97 16.97 21 12 21C7.03 21 3 16.97 3 12C3 7.03 7.03 3 12 3C16.97 3 21 7.03 21 12Z",fire:"M12 2C6 8 6 13 9 16C9 13 11 11 12 10C12 13 14 15 14 17C17 15 18 11 15 7C15 10 13 11 12 13C11 11 13 7 12 2Z",users:"M17 21V19C17 16.8 15.2 15 13 15H5C2.8 15 1 16.8 1 19V21M23 21V19C23 17.1 21.7 15.5 20 15.1M16 3.1C17.7 3.5 19 5.1 19 7S17.7 10.5 16 10.9M13 7C13 9.2 11.2 11 9 11C6.8 11 5 9.2 5 7S6.8 3 9 3S13 4.8 13 7Z",x:"M18 6L6 18M6 6L18 18",lock:"M19 11H5C3.9 11 3 11.9 3 13V20C3 21.1 3.9 22 5 22H19C20.1 22 21 21.1 21 20V13C21 11.9 20.1 11 19 11ZM12 17C11.4 17 11 16.6 11 16S11.4 15 12 15S13 15.4 13 16S12.6 17 12 17ZM17 11V7C17 4.2 14.8 2 12 2S7 4.2 7 7V11",arrow:"M19 12H5M12 5L5 12L12 19",star:"M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z",eye:"M1 12S5 4 12 4 23 12 23 12 19 20 12 20 1 12 1 12ZM12 15C13.66 15 15 13.66 15 12S13.66 9 12 9 9 10.34 9 12 10.34 15 12 15Z",eyeOff:"M17.94 17.94A10.07 10.07 0 0112 20C5 20 1 12 1 12A18.09 18.09 0 015.06 5.06M9.9 4.24A9.12 9.12 0 0112 4C19 4 23 12 23 12A18.09 18.09 0 0118.94 18.94M1 1L23 23",chevronL:"M15 18L9 12L15 6",chevronR:"M9 18L15 12L9 6",trophy:"M8 21H16M12 17V21M7 4H17L16 11C16 13.76 14.21 16 12 16S8 13.76 8 11L7 4ZM4 7H7M17 7H20"};
const Icon=({name,size=22,color=C.muted})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={P[name]||""}/></svg>;

/* ── Atoms ───────────────────────────────── */
const Logo=({size=32})=><img src="/logoamazonas.png" alt="Amazonas" style={{width:size,height:size,objectFit:"contain",flexShrink:0}}/>;
const Tag=({children,color})=><span style={{background:color+"20",color,border:`1px solid ${color}40`,borderRadius:6,fontSize:10,fontWeight:700,letterSpacing:1,padding:"2px 8px",textTransform:"uppercase"}}>{children}</span>;
const Btn=({children,onClick,variant="primary",small,full,disabled,loading})=>{
  const bg={primary:C.accent,danger:C.red,green:C.green,ghost:C.subtle}[variant]||C.subtle;
  const fg=(variant==="primary"||variant==="green")?"#000":"#fff",off=disabled||loading;
  return<button onClick={onClick} disabled={off} style={{background:off?C.subtle:bg,color:off?C.muted:fg,border:"none",borderRadius:10,padding:small?"7px 14px":"12px 20px",fontSize:small?11:13,fontWeight:800,letterSpacing:1,cursor:off?"not-allowed":"pointer",width:full?"100%":"auto",textTransform:"uppercase",fontFamily:"inherit",opacity:off?0.5:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
    {loading&&<span style={{width:13,height:13,border:"2px solid currentColor",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>}
    {children}</button>;};
const Card=({children,style={},highlight})=><div style={{background:C.card,border:`1px solid ${highlight?highlight+"55":C.border}`,borderRadius:14,padding:16,marginBottom:12,...style}}>{children}</div>;
const Bar=({value,max,color=C.accent,thin})=><div style={{height:thin?4:6,background:C.subtle,borderRadius:6,overflow:"hidden"}}><div style={{width:`${Math.min((value/max)*100,100)}%`,height:"100%",background:color,borderRadius:6,transition:"width .5s"}}/></div>;
const Divider=()=><div style={{height:1,background:C.border,margin:"12px 0"}}/>;

const PasswordInput=({value,onChange,placeholder="Senha",onKeyDown})=>{
  const[show,setShow]=useState(false);
  const inp={width:"100%",background:C.subtle,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 48px 14px 16px",color:C.text,fontSize:15,fontFamily:"inherit",boxSizing:"border-box"};

    <input type={show?"text":"password"} value={value} onChange={onChange} onKeyDown={onKeyDown} placeholder={placeholder} style={inp}/>

/* ════════════════════════════════════════════
   LOGIN
════════════════════════════════════════════ */
function LoginScreen({onLogin,onAdmin}){
  const[modo,setModo]=useState("login"); // login | cadastro | recuperar
  const[user,setUser]=useState(""),  [senha,setSenha]=useState(""),  [confirma,setConfirma]=useState("");
  const[loading,setLoading]=useState(false),  [erro,setErro]=useState(""),  [sucesso,setSucesso]=useState("");
  const[showAdmin,setShowAdmin]=useState(false),  [adminUser,setAdminUser]=useState(""),  [adminPass,setAdminPass]=useState(""),  [adminErro,setAdminErro]=useState("");

  const limpar=()=>{setErro("");setSucesso("");};
  const inp={width:"100%",background:C.subtle,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:15,fontFamily:"inherit",boxSizing:"border-box"};

  const handleLogin=async()=>{
    if(!user.trim()||!senha){setErro("Preencha usuário e senha.");return;}
    if(!sb){setErro("Configuração pendente. Contate o administrador.");return;}
    setLoading(true);limpar();
    const email=toEmail(user);
    const{error,data}=await sb.auth.signInWithPassword({email,password:senha});
    setLoading(false);
    if(error)setErro("Usuário ou senha incorretos.");
    else onLogin(data.user,user.trim());
  };

  const handleCadastro=async()=>{
    if(!user.trim()||!senha){setErro("Preencha todos os campos.");return;}
    if(senha.length<6){setErro("Senha precisa ter ao menos 6 caracteres.");return;}
    if(senha!==confirma){setErro("As senhas não coincidem.");return;}
    if(!sb){setErro("Configuração pendente. Contate o administrador.");return;}
    setLoading(true);limpar();
    const email=toEmail(user);
    const{error}=await sb.auth.signUp({email,password:senha,options:{data:{username:user.trim()}}});
    setLoading(false);
    if(error)setErro(error.message.includes("already")?"Este usuário já existe.":"Erro ao criar conta. Tente outro nome de usuário.");
    else{setSucesso("Conta criada com sucesso! Faça login agora.");setModo("login");setSenha("");setConfirma("");}
  };

  const handleAdminLogin=()=>{
    if(adminUser.trim().toLowerCase()===ADMIN_USER && adminPass.toLowerCase()===ADMIN_PASS){
      onAdmin();
    } else {
      setAdminErro("Credenciais incorretas.");
    }
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:32,animation:"fadeIn .5s ease"}}>
        <img src="/logoamazonas.png" alt="Amazonas" style={{width:130,height:130,objectFit:"contain",marginBottom:4}}/>
      </div>

      {/* Formulário principal */}
      {!showAdmin && (
        <div style={{width:"100%",maxWidth:340,animation:"fadeIn .4s ease .1s both"}}>
          {/* Tabs */}
          {modo!=="recuperar" && (
            <div style={{display:"flex",background:C.subtle,borderRadius:12,padding:4,marginBottom:22}}>
              {[["login","Entrar"],["cadastro","Criar conta"]].map(([m,l])=>(
                <button key={m} onClick={()=>{setModo(m);limpar();setSenha("");setConfirma("");}} style={{flex:1,background:modo===m?C.accent:"none",color:modo===m?"#000":C.muted,border:"none",borderRadius:10,padding:"10px",fontWeight:800,fontSize:13,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase"}}>{l}</button>
              ))}
            </div>
          )}

          {modo==="recuperar" && (
            <div style={{marginBottom:18}}>
              <button onClick={()=>{setModo("login");limpar();}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                <Icon name="arrow" size={14} color={C.muted}/> Voltar
              </button>
              <div style={{fontSize:20,fontWeight:900,marginTop:10,marginBottom:4}}>Recuperar acesso</div>
              <div style={{fontSize:13,color:C.muted}}>Entre em contato com o administrador do box para redefinir sua senha.</div>
            </div>
          )}

          {sucesso&&<div style={{background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:13,fontWeight:700,color:C.green}}>✅ {sucesso}</div>}

          <div style={{marginBottom:10}}>
            <input value={user} onChange={e=>{setUser(e.target.value);limpar();}} placeholder="Nome de usuário" style={inp}
              onKeyDown={e=>modo==="login"&&e.key==="Enter"&&document.getElementById("inp-senha")?.focus()}/>
          </div>

          {modo!=="recuperar"&&(
            <div style={{marginBottom:10}}>
              <PasswordInput value={senha} onChange={e=>{setSenha(e.target.value);limpar();}} placeholder="Senha"
                onKeyDown={e=>e.key==="Enter"&&(modo==="login"?handleLogin():(confirma?handleCadastro():document.getElementById("inp-confirma")?.focus()))}/>
            </div>
          )}

          {modo==="cadastro"&&(
            <div style={{marginBottom:10}}>
              <div style={{position:"relative"}}>
                <input id="inp-confirma" type="password" value={confirma} onChange={e=>{setConfirma(e.target.value);limpar();}}
                  onKeyDown={e=>e.key==="Enter"&&handleCadastro()}
                  placeholder="Confirmar senha" style={inp}/>
              </div>
            </div>
          )}

          {erro&&<div style={{fontSize:12,color:C.red,fontWeight:700,marginBottom:10,padding:"8px 12px",background:C.red+"14",borderRadius:8,border:`1px solid ${C.red}33`}}>⚠️ {erro}</div>}

          <div style={{marginTop:14}}>
            {modo==="login"&&<>
              <Btn full loading={loading} onClick={handleLogin}>Entrar</Btn>
              <button onClick={()=>{setModo("recuperar");limpar();}} style={{background:"none",border:"none",color:C.muted,fontSize:11,fontWeight:700,cursor:"pointer",width:"100%",marginTop:12,fontFamily:"inherit"}}>Esqueci minha senha</button>
            </>}
            {modo==="cadastro"&&<Btn full loading={loading} onClick={handleCadastro}>Criar conta</Btn>}
            {modo==="recuperar"&&<Btn full variant="ghost" onClick={()=>setModo("login")}>Voltar ao login</Btn>}
          </div>

          {/* Botão admin discreto */}
          <div style={{marginTop:32,textAlign:"center"}}>
            <button onClick={()=>setShowAdmin(true)} style={{background:"none",border:"none",color:"#2a2a2a",fontSize:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>
              ···
            </button>
          </div>
        </div>
      )}

      {/* Painel admin login */}
      {showAdmin && (
        <div style={{width:"100%",maxWidth:340,animation:"fadeIn .3s ease"}}>
          <button onClick={()=>{setShowAdmin(false);setAdminErro("");setAdminUser("");setAdminPass("");}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit",fontSize:12,fontWeight:700,marginBottom:16}}>
            <Icon name="arrow" size={14} color={C.muted}/> Voltar
          </button>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{width:44,height:44,borderRadius:12,background:C.accent+"22",border:`1px solid ${C.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>
              <Icon name="lock" size={20} color={C.accent}/>
            </div>
            <div style={{fontSize:18,fontWeight:900}}>Acesso Administrativo</div>
          </div>
          <div style={{marginBottom:10}}>
            <input value={adminUser} onChange={e=>{setAdminUser(e.target.value);setAdminErro("");}} placeholder="Usuário admin"
              onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()} style={inp}/>
          </div>
          <div style={{marginBottom:10}}>
            <PasswordInput value={adminPass} onChange={e=>{setAdminPass(e.target.value);setAdminErro("");}} placeholder="Senha admin"
              onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}/>
          </div>
          {adminErro&&<div style={{fontSize:12,color:C.red,fontWeight:700,marginBottom:10,padding:"8px 12px",background:C.red+"14",borderRadius:8}}>⚠️ {adminErro}</div>}
          <Btn full onClick={handleAdminLogin}>Entrar como Admin</Btn>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════
   INSTALL POPUP
════════════════════════════════════════════ */
function InstallPopup({onClose,onNever}){
  const ua=navigator.userAgent,isIOS=/iphone|ipad|ipod/i.test(ua),isAndroid=/android/i.test(ua);
  const showIOS=isIOS||(!isIOS&&!isAndroid),showAndroid=isAndroid||(!isIOS&&!isAndroid);
  const Step=({n,text})=><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{width:22,height:22,borderRadius:"50%",background:C.accent,color:"#000",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div><span style={{fontSize:13,color:C.text,fontWeight:600}}>{text}</span></div>;
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,0.82)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.surface,borderRadius:"20px 20px 0 0",border:`1px solid ${C.border}`,padding:"20px 20px 40px",width:"100%",maxWidth:430,animation:"slideUp .3s ease"}}>
        <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>

  const[expandido,setExpandido]=useState(null);
  const now=new Date();
  const[calMes,setCalMes]=useState(now.getMonth());
  const[calAno,setCalAno]=useState(now.getFullYear());
  const[diaSel,setDiaSel]=useState(now);

  const pendentes=pedidos.filter(p=>p.status==="pendente").length;
  const ativos=MOCK_PERFIS.filter(p=>p.status==="ativo");
  const inativos=MOCK_PERFIS.filter(p=>p.status==="inativo");

  // Checkins do mês selecionado (mock — soma fixa por aluno)
  const checkinsDoMes=Object.entries(MOCK_CHECKINS_MES).map(([username,total])=>({username,total})).sort((a,b)=>b.total-a.total);
  const atingiram15=checkinsDoMes.filter(c=>c.total>=15);

  // Checkins do dia selecionado
  const checkinsDia=gerarCheckinsDia(diaSel);

  // Total de checkins do dia
  const totalCheckinsHoje=checkinsDia.length;

  const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  const prevMes=()=>{if(calMes===0){setCalMes(11);setCalAno(calAno-1);}else setCalMes(calMes-1);};
  const nextMes=()=>{if(calMes===11){setCalMes(0);setCalAno(calAno+1);}else setCalMes(calMes+1);};

  // Gerador de calendário simples
  const gerarCal=()=>{
    const primeiroDia=new Date(calAno,calMes,1).getDay();
    const diasNoMes=new Date(calAno,calMes+1,0).getDate();
    const cells=[];
    for(let i=0;i<primeiroDia;i++) cells.push(null);
    for(let d=1;d<=diasNoMes;d++) cells.push(d);
    return cells;
  };

  const abas=[
    {id:"dashboard",label:"Dashboard",icon:"home"},
    {id:"pedidos",  label:"Pedidos",  icon:"bell",badge:pendentes},
    {id:"alunos",   label:"Alunos",   icon:"users"},
  ];

  const cards=[
    {id:"total",   label:"Total Cadastros", val:MOCK_PERFIS.length,  color:C.accent, icon:"users",  lista:MOCK_PERFIS},
    {id:"ativos",  label:"Ativos",          val:ativos.length,        color:C.green,  icon:"check",  lista:ativos},
    {id:"inativos",label:"Inativos",        val:inativos.length,      color:C.red,    icon:"x",      lista:inativos},
    {id:"checkins",label:"Check-ins Hoje",  val:totalCheckinsHoje,    color:C.blue,   icon:"fire",   lista:[]},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:430,margin:"0 auto"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}}`}</style>
      {/* Header */}
      <div style={{background:"#0D0D0D",borderBottom:`1px solid ${C.border}`,padding:"13px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo size={30}/>
          <div><div style={{fontSize:13,fontWeight:900,color:C.accent,letterSpacing:1,lineHeight:1}}>ADMIN</div><div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:2,lineHeight:1}}>AMAZONAS ALTA PERFORMANCE</div></div>
        </div>
        <button onClick={onSair} style={{background:C.subtle,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <Icon name="arrow" size={14} color={C.muted}/><span style={{fontSize:11,fontWeight:700,color:C.muted,fontFamily:"inherit",letterSpacing:1}}>SAIR</span>
        </button>
      </div>

      <div style={{padding:"16px 16px 90px"}}>

        {/* ── DASHBOARD ── */}
        {aba==="dashboard"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Visão Geral</div>

            {/* Cards clicáveis */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {cards.map(s=>(
                <div key={s.id} onClick={()=>s.lista.length>0&&setExpandido(expandido===s.id?null:s.id)}
                  style={{background:C.card,border:`1px solid ${expandido===s.id?s.color:s.color+"33"}`,borderRadius:14,padding:"16px 14px",cursor:s.lista.length>0?"pointer":"default",transition:"border-color .2s"}}>
                  <Icon name={s.icon} size={18} color={s.color}/>
                  <div style={{fontSize:28,fontWeight:900,color:s.color,marginTop:8,lineHeight:1}}>{s.val}</div>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginTop:4}}>{s.label}</div>
                  {s.lista.length>0&&<div style={{fontSize:9,color:s.color,fontWeight:700,marginTop:4}}>{expandido===s.id?"▲ fechar":"▼ ver lista"}</div>}
                </div>
              ))}
            </div>

            {/* Lista expandida dos cards */}
            {expandido&&cards.find(c=>c.id===expandido)?.lista.length>0&&(
              <div style={{marginBottom:14}}>
                {cards.find(c=>c.id===expandido).lista.map((p,i)=>{
                  const cor=cards.find(c=>c.id===expandido).color;
                  return<div key={p.id||i} style={{background:C.card,border:`1px solid ${cor}33`,borderRadius:12,padding:"11px 14px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <Avatar nome={p.username||p.nome||"?"} color={cor} size={32}/>
                      <div><div style={{fontWeight:800,fontSize:13}}>@{p.username||p.nome}</div><div style={{fontSize:10,color:C.muted}}>{p.plano} · {p.status}</div></div>
                    </div>
                    <Tag color={p.status==="ativo"?C.green:p.status==="inativo"?C.red:cor}>{p.status||"—"}</Tag>
                  </div>;
                })}
              </div>
            )}

            {/* ── Checkins do dia ── */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10,marginTop:4}}>
              Check-ins por Dia
            </div>

            {/* Calendário */}
            <Card>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <button onClick={prevMes} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="chevronL" size={18} color={C.muted}/></button>
                <div style={{fontSize:14,fontWeight:800,color:C.text}}>{MESES[calMes]} {calAno}</div>
                <button onClick={nextMes} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="chevronR" size={18} color={C.muted}/></button>
              </div>
              {/* Cabeçalho dias da semana */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
                {["D","S","T","Q","Q","S","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,padding:"2px 0"}}>{d}</div>)}
              </div>
              {/* Células do calendário */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                {gerarCal().map((d,i)=>{
                  if(!d)return<div key={i}/>;
                  const dataCel=new Date(calAno,calMes,d);
                  const isHoje=dataCel.toDateString()===now.toDateString();
                  const isSel=dataCel.toDateString()===diaSel.toDateString();
                  const ckDia=gerarCheckinsDia(dataCel).length;
                  const temCheckin=ckDia>0;
                  return<button key={i} onClick={()=>setDiaSel(dataCel)} style={{aspectRatio:"1",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",position:"relative",
                    background:isSel?C.accent:isHoje?C.accentD+"44":temCheckin?C.green+"18":C.subtle,
                    color:isSel?"#000":isHoje?C.accent:C.text,
                    fontWeight:isSel||isHoje?900:600,fontSize:11,
                    outline:isSel?`2px solid ${C.accent}`:"none"}}>
                    {d}
                    {temCheckin&&!isSel&&<div style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:isSel?"#000":C.green}}/>}
                  </button>;
                })}
              </div>
            </Card>

            {/* Lista de checkins do dia selecionado */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8}}>
              Check-ins — {diaSel.toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"})} ({checkinsDia.length})
            </div>
            {checkinsDia.length===0
              ?<Card><div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"8px 0"}}>Nenhum check-in neste dia</div></Card>
              :checkinsDia.map((c,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.green}33`,borderRadius:12,padding:"11px 14px",marginBottom:7,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Avatar nome={c.username} color={C.green} size={32}/>
                  <div><div style={{fontWeight:800,fontSize:13}}>@{c.username}</div><div style={{fontSize:10,color:C.muted}}>{c.aula}</div></div>
                </div>
                <Tag color={C.green}>{c.hora}</Tag>
              </div>)}

            {/* ── Isentos do mês ── */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8,marginTop:4}}>
              🏆 Isentos — {MESES[calMes]}
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
              Alunos que atingiram 15 check-ins e estão isentos pelo resto do mês
            </div>
            {atingiram15.length===0
              ?<Card><div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"8px 0"}}>Nenhum aluno atingiu 15 check-ins ainda neste mês</div></Card>
              :atingiram15.map((c,i)=><div key={i} style={{background:C.green+"0F",border:`1px solid ${C.green}33`,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Avatar nome={c.username} color={C.green}/>
                  <div><div style={{fontWeight:800,fontSize:14}}>@{c.username}</div><div style={{fontSize:11,color:C.muted}}>Isento pelo resto do mês</div></div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:20,fontWeight:900,color:C.green}}>{c.total}</div>
                  <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>check-ins</div>
                </div>
              </div>)}

            {/* Todos os check-ins do mês */}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8,marginTop:4}}>
              Todos — {MESES[calMes]}
            </div>
            {checkinsDoMes.map((c,i)=>{
              const pct=Math.min(c.total/15,1);
              const cor=c.total>=15?C.green:c.total>=10?C.accent:C.muted;
              return<div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar nome={c.username} color={cor} size={30}/>
                    <span style={{fontWeight:800,fontSize:13}}>@{c.username}</span>
                  </div>
                  <span style={{fontSize:14,fontWeight:900,color:cor}}>{c.total}/15 {c.total>=15?"🏆":""}</span>
                </div>
                <Bar value={c.total} max={15} color={cor} thin/>
              </div>;
            })}
          </div>
        )}

        {/* ── PEDIDOS ── */}
        {aba==="pedidos"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Solicitações</div>
            <p style={{fontSize:13,color:C.muted,marginBottom:14}}>Lista de espera e aulas experimentais</p>
            {pedidos.map(p=>{
              const cor=p.tipo==="experimental"?C.blue:C.yellow;
              return<Card key={p.id} highlight={p.status==="pendente"?cor:p.status==="aceito"?C.green:C.red}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar nome={p.nome} color={cor}/>
                    <div><div style={{fontWeight:800,fontSize:14}}>{p.nome}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.aula}</div><div style={{fontSize:10,color:C.muted,marginTop:1}}>Solicitado às {p.hora}</div></div>
                  </div>
                  <Tag color={cor}>{p.tipo==="experimental"?"Experimental":"Espera"}</Tag>
                </div>
                {p.status==="pendente"?<div style={{display:"flex",gap:8}}>
                  <Btn full variant="green" small onClick={()=>setPedidos(pedidos.map(x=>x.id===p.id?{...x,status:"aceito"}:x))}>✓ Aceitar</Btn>
                  <Btn full variant="danger" small onClick={()=>setPedidos(pedidos.map(x=>x.id===p.id?{...x,status:"recusado"}:x))}>✗ Recusar</Btn>
                </div>:<div style={{textAlign:"center"}}><Tag color={p.status==="aceito"?C.green:C.red}>{p.status==="aceito"?"✓ Aceito":"✗ Recusado"}</Tag></div>}
              </Card>;
            })}
          </div>
        )}

        {/* ── ALUNOS ── */}
        {aba==="alunos"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:14}}>Alunos Cadastrados</div>
            {MOCK_PERFIS.map(p=>{
              const ck=MOCK_CHECKINS_MES[p.username]||0,at=ck>=15;
              const cor=p.status==="inativo"?C.red:at?C.green:C.accent;
              return<Card key={p.id} highlight={at?C.green:p.status==="inativo"?C.red:null}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar nome={p.username} color={cor}/>
                    <div><div style={{fontWeight:800,fontSize:14}}>@{p.username}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.plano} · Vence {new Date(p.vencimento).toLocaleDateString("pt-BR")}</div></div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <Tag color={p.status==="ativo"?C.green:C.red}>{p.status}</Tag>
                    {at&&<Tag color={C.green}>🏆 Isento</Tag>}
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Check-ins</span>
                  <span style={{fontSize:13,fontWeight:900,color:cor}}>{ck}/15 {at?"✅":""}</span>
                </div>
                <Bar value={ck} max={15} color={cor} thin/>
                {at&&<div style={{marginTop:8,background:C.green+"18",border:`1px solid ${C.green}33`,borderRadius:8,padding:"6px 10px"}}><span style={{fontSize:11,color:C.green,fontWeight:700}}>Isento — sem check-in obrigatório pelo resto do mês</span></div>}
              </Card>;
            })}
          </div>
        )}
      </div>

      {/* Bottom nav admin */}
      <div style={{display:"flex",background:"#0D0D0D",borderTop:`1px solid ${C.border}`,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
        {abas.map(t=>{const active=aba===t.id;return<button key={t.id} onClick={()=>setAba(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",background:"none",border:"none",borderTop:active?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",position:"relative"}}>
          <Icon name={t.icon} size={20} color={active?C.accent:C.muted}/>
          {t.badge>0&&<div style={{position:"absolute",top:6,right:"50%",marginRight:-18,width:16,height:16,borderRadius:"50%",background:C.red,fontSize:9,fontWeight:900,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</div>}
          <span style={{fontSize:9,fontWeight:700,letterSpacing:1,marginTop:4,color:active?C.accent:C.muted,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.label}</span>
        </button>;})}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null),[username,setUsername]=useState("");
  const[authLoading,setAuthLoading]=useState(true);
  const[adminMode,setAdminMode]=useState(false);
  const[tab,setTab]=useState("home"),[reservas,setReservas]=useState([]);
  const[showInstall,setShowInstall]=useState(false),[notifPerm,setNotifPerm]=useState("default");
  const[banner,setBanner]=useState(null),[prs,setPrs]=useState(PR_DEF);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(!SUPABASE_OK||!sb){setAuthLoading(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        setUser(session.user);
        const uname=session.user.user_metadata?.username||session.user.email?.split("@")[0]||"aluno";
        setUsername(uname);
      }
      setAuthLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(session?.user){
        const uname=session.user.user_metadata?.username||session.user.email?.split("@")[0]||"aluno";
        setUsername(uname);
      }
    });
    window.addEventListener("beforeinstallprompt",e=>e.preventDefault());
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user)return;
    const r=LS.get(`prs_${user.id}`);if(r)setPrs(JSON.parse(r.value));
    const p=LS.get("install-never-show");if(!p)setShowInstall(true);
  },[user]);

  useEffect(()=>{
    const res=AULAS.find(a=>reservas.includes(a.id));
    if(!res){setBanner(null);return;}
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>setBanner(res),4000);
    return()=>clearTimeout(timerRef.current);
  },[reservas]);

  const salvarPRs=lista=>{setPrs(lista);if(user)LS.set(`prs_${user.id}`,JSON.stringify(lista));};
  const fecharInstall=()=>setShowInstall(false);
  const nuncaMostrar=()=>{setShowInstall(false);LS.set("install-never-show","1");};
  const ativarNotif=async()=>{
    if(!("Notification"in window)){alert("Adicione o app à tela inicial para ativar notificações.");return;}
    const p=await Notification.requestPermission();setNotifPerm(p);
    if(p==="granted")new Notification("Amazonas Alta Performance 🔥",{body:"Notificações ativadas!",icon:"/logoamazonas.png"});
  };

  if(authLoading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <Logo size={60}/>
      <div style={{width:32,height:32,border:`3px solid ${C.border}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
    </div>
  );

  if(adminMode)return<AdminPanel onSair={()=>setAdminMode(false)}/>;

  if(!user)return<LoginScreen
    onLogin={(u,uname)=>{setUser(u);setUsername(uname||u.user_metadata?.username||u.email?.split("@")[0]||"aluno");}}
    onAdmin={()=>setAdminMode(true)}/>;

  const navTabs=[{id:"home",label:"Início",icon:"home"},{id:"aulas",label:"Aulas",icon:"calendar"},{id:"perfil",label:"Perfil",icon:"person"}];
  const screens={
    home:<HomeScreen username={username} reservas={reservas} setReservas={setReservas} setTab={setTab} notifPerm={notifPerm} onAtivarNotif={ativarNotif} prs={prs}/>,
    aulas:<AulasScreen reservas={reservas} setReservas={setReservas}/>,
    perfil:<PerfilScreen user={user} username={username} prs={prs} salvarPRs={salvarPRs} onLogout={()=>{setUser(null);setUsername("");setTab("home");}}/>,
  };

  return(
    <div style={{fontFamily:"'Barlow Condensed',Impact,sans-serif",background:C.bg,color:C.text,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}} @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>
      {banner&&<NotifBanner aula={banner} onDismiss={()=>setBanner(null)}/>}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"13px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo size={32}/>
          <div><div style={{fontSize:14,fontWeight:900,color:C.accent,letterSpacing:2,lineHeight:1}}>AMAZONAS</div><div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:2,lineHeight:1}}>ALTA PERFORMANCE</div></div>
        </div>
      </div>
      <div style={{padding:"16px 16px 90px"}}>{screens[tab]}</div>
      <div style={{display:"flex",background:C.surface,borderTop:`1px solid ${C.border}`,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
        {navTabs.map(t=>{const active=tab===t.id;return<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",background:"none",border:"none",borderTop:active?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer"}}><Icon name={t.icon} size={20} color={active?C.accent:C.muted}/><span style={{fontSize:9,fontWeight:700,letterSpacing:1,marginTop:4,color:active?C.accent:C.muted,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.label}</span></button>;})}
      </div>
      {showInstall&&<InstallPopup onClose={fecharInstall} onNever={nuncaMostrar}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
